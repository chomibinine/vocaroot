<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VocaRoots Pro - Ultimate Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; background-color: #f8fafc; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* 카드 래퍼 및 애니메이션 */
        #cardWrapper { position: relative; width: 100%; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s; }
        
        /* 모바일 화면 높이에 맞춘 카드 높이 최적화 */
        .flip-card { perspective: 1000px; width: 100%; height: calc(100vh - 280px); min-height: 480px; max-height: 600px; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        
        .flip-card-front, .flip-card-back { 
            position: absolute; width: 100%; height: 100%; 
            -webkit-backface-visibility: hidden; backface-visibility: hidden; 
            border-radius: 2.5rem; display: flex; flex-direction: column; 
            box-shadow: 0 20px 40px -15px rgb(0 0 0 / 0.1); border: 1px solid #e2e8f0; 
            background: white; overflow: hidden;
        }
        
        .flip-card-front { align-items: center; justify-content: center; padding: 2rem; }
        /* 뒷면 레이아웃: 위아래 꽉 차게 배분 */
        .flip-card-back { 
            transform: rotateY(180deg); 
            align-items: stretch; justify-content: space-between; 
            padding: 1.25rem; overflow-y: auto; 
        }

        /* 스와이프 슬라이드 애니메이션 */
        .slide-out-left { transform: translateX(-130%) rotate(-10deg) !important; opacity: 0; }
        .slide-out-right { transform: translateX(130%) rotate(10deg) !important; opacity: 0; }
        .slide-in { animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards; }
        @keyframes slideIn { from { transform: scale(0.95) translateY(30px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

        #dictPanel { transform: translateX(100%); transition: transform 0.3s ease; }
        #dictPanel.open { transform: translateX(0); }
        .btn-active:active { transform: scale(0.92); opacity: 0.8; }
        
        /* 어원 분석 아이템 스타일링 */
        .etym-box { border-left: 4px solid #6366f1; background-color: #f5f3ff; padding: 8px 12px; border-radius: 0.75rem; }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col overflow-hidden select-none" onclick="app.unlockAudio()">

    <header class="bg-white border-b border-slate-200 z-40 shrink-0 px-4 py-3 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-xl shadow-md"><i data-lucide="graduation-cap" class="text-white w-5 h-5"></i></div>
                <h1 class="text-lg font-black text-slate-900 tracking-tight">Voca<span class="text-indigo-600">Roots</span></h1>
            </div>
            <div class="flex items-center gap-2">
                <div id="loadStatus" class="flex items-center gap-1.5 bg-slate-50 px-2.5 py-1.5 rounded-full border border-slate-200">
                    <div class="w-2 h-2 bg-slate-300 rounded-full" id="statusDot"></div>
                    <span id="statusText" class="text-[9px] font-black text-slate-400 uppercase">Search</span>
                </div>
                <button onclick="app.toggleDict()" class="p-2.5 rounded-xl bg-slate-50 text-slate-400 active:text-indigo-600 btn-active"><i data-lucide="search" class="w-5 h-5"></i></button>
            </div>
        </div>
    </header>

    <main id="mainDashboard" class="flex-1 overflow-y-auto p-4 pb-24">
        <div class="max-w-4xl mx-auto">
            <div class="mb-6 flex items-center justify-between bg-white p-5 rounded-[2rem] border border-slate-200 shadow-sm">
                <div>
                    <h2 id="totalProgressText" class="text-2xl font-black text-slate-900 leading-none">0% Done</h2>
                    <span id="wordCountLabel" class="text-[11px] font-bold text-indigo-500 uppercase tracking-widest mt-1.5 block">No Words Active</span>
                </div>
                <button onclick="app.resetHistory()" class="p-2 text-slate-300 active:text-rose-500 transition-colors"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
            </div>

            <div class="grid grid-cols-3 gap-2 mb-6">
                <div class="bg-white p-2.5 rounded-2xl border border-slate-200 shadow-sm">
                    <p class="text-[8px] font-black text-slate-300 uppercase mb-1 text-center">Level</p>
                    <select id="courseLevel" onchange="app.renderGrid()" class="w-full bg-transparent font-black text-[12px] outline-none text-center">
                        <option value="all">전체</option>
                        <option value="middle">중학</option>
                        <option value="high">고등</option>
                    </select>
                </div>
                <div class="bg-white p-2.5 rounded-2xl border border-slate-200 shadow-sm">
                    <p class="text-[8px] font-black text-slate-300 uppercase mb-1 text-center">Amount</p>
                    <select id="dailyAmount" onchange="app.renderGrid()" class="w-full bg-transparent font-black text-[12px] outline-none text-center">
                        <option value="10">10개</option>
                        <option value="20" selected>20개</option>
                        <option value="30">30개</option>
                    </select>
                </div>
                <div class="bg-white p-2.5 rounded-2xl border border-slate-200 shadow-sm">
                    <p class="text-[8px] font-black text-slate-300 uppercase mb-1 text-center">Sort</p>
                    <select id="sortOrder" onchange="app.renderGrid()" class="w-full bg-transparent font-black text-[12px] outline-none text-center">
                        <option value="root">어근별</option>
                        <option value="alpha">A-Z순</option>
                        <option value="level">중요도</option>
                    </select>
                </div>
            </div>

            <div id="daysGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4"></div>
            <div id="emptyMsg" class="py-24 text-center text-slate-300 font-bold"><i data-lucide="inbox" class="w-12 h-12 mx-auto mb-3 opacity-20"></i>DATA를 불러와주세요.</div>
        </div>
    </main>

    <div id="sessionLayer" class="fixed inset-0 z-[100] bg-white hidden flex flex-col overflow-hidden">
        <div class="bg-white border-b border-slate-100 px-5 py-4 flex justify-between items-center shrink-0">
            <button onclick="app.confirmExit()" class="text-slate-400 p-2 btn-active"><i data-lucide="home" class="w-7 h-7 text-slate-300"></i></button>
            <div class="text-center">
                <span id="sessionDayLabel" class="text-[10px] font-black text-indigo-400 uppercase tracking-widest">DAY 01</span>
                <div class="flex bg-slate-100 p-0.5 rounded-lg mt-0.5">
                    <button id="mode-study" onclick="app.switchMode('study')" class="px-4 py-1 text-[10px] font-black rounded-md bg-white shadow-sm text-indigo-600 transition-all">STUDY</button>
                    <button id="mode-quiz" onclick="app.switchMode('quiz')" class="px-4 py-1 text-[10px] font-black rounded-md text-slate-400 transition-all">QUIZ</button>
                </div>
            </div>
            <div class="text-[11px] font-black min-w-[55px] text-right"><span id="sessionIdx" class="text-indigo-600 text-lg">1</span><span class="text-slate-200 mx-0.5">/</span><span id="sessionTotal" class="text-slate-400">20</span></div>
        </div>

        <div id="sessionContent" class="flex-1 bg-slate-50 flex flex-col p-4 relative overflow-hidden" ontouchstart="app.ts(event)" ontouchend="app.te(event)">
            
            <div id="studyUI" class="flex-1 flex flex-col items-center justify-center w-full max-w-md mx-auto">
                <div id="cardWrapper" class="w-full slide-in">
                    <div class="flip-card cursor-pointer" id="flashcard" onclick="this.classList.toggle('flipped')">
                        <div class="flip-card-inner">
                            <div class="flip-card-front">
                                <span class="text-indigo-300 text-[11px] font-black uppercase tracking-[0.4em] mb-4">Tap to Flip</span>
                                <h2 id="lWord" class="text-6xl font-black text-slate-900 tracking-tighter mb-2"></h2>
                                <p id="lPron" class="text-slate-300 text-xl font-medium italic mb-10"></p>
                                
                                <button onclick="event.stopPropagation(); app.speak(document.getElementById('lWord').textContent)" 
                                        class="p-8 bg-indigo-600 text-white rounded-full active:scale-90 shadow-2xl shadow-indigo-100 btn-active">
                                    <i data-lucide="volume-2" class="w-12 h-12"></i>
                                </button>
                                
                                <div class="absolute bottom-8 flex items-center gap-2 text-[10px] font-black text-slate-200 uppercase tracking-widest">
                                    <i data-lucide="move-horizontal" class="w-4 h-4"></i> Swipe to Move
                                </div>
                            </div>
                            
                            <div class="flip-card-back custom-scroll">
                                <div class="text-center mb-4 shrink-0">
                                    <span class="bg-indigo-600 text-white px-8 py-2.5 rounded-2xl text-2xl font-black inline-block shadow-lg" id="lMeaning"></span>
                                </div>
                                
                                <div class="mb-4">
                                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 flex items-center gap-1.5"><i data-lucide="layers" class="w-3.5 h-3.5"></i> Etymology Analysis</p>
                                    <div id="lEtym" class="space-y-2"></div>
                                </div>

                                <div class="mb-4">
                                    <div class="bg-amber-50 p-4 rounded-2xl border border-amber-100 shadow-sm">
                                        <p class="text-amber-800 font-black text-[10px] uppercase mb-1 flex items-center gap-1.5"><i data-lucide="sparkles" class="w-3.5 h-3.5"></i> Story Memory</p>
                                        <p id="lStory" class="text-amber-900 text-[15px] font-bold leading-relaxed"></p>
                                    </div>
                                </div>

                                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 relative shadow-sm shrink-0">
                                    <div class="flex justify-between items-center mb-1">
                                        <p class="text-slate-400 font-black text-[10px] uppercase">Example Sentence</p>
                                        <button onclick="event.stopPropagation(); app.speak(document.getElementById('lExEn').textContent)" class="p-1 bg-white rounded-lg text-indigo-500 shadow-sm"><i data-lucide="volume-1" class="w-5 h-5"></i></button>
                                    </div>
                                    <p id="lExEn" class="text-slate-800 font-black italic text-[16px] leading-snug mb-1"></p>
                                    <p id="lExKo" class="text-slate-500 text-[13px] font-bold"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="mt-8 flex gap-4 w-full">
                    <button onclick="app.moveLeft()" class="h-16 w-16 bg-white border border-slate-200 rounded-3xl flex items-center justify-center text-slate-400 btn-active shadow-sm"><i data-lucide="chevron-left" class="w-8 h-8"></i></button>
                    <button id="nextBtn" onclick="app.moveRight()" class="flex-1 h-16 bg-slate-900 text-white rounded-3xl font-black shadow-xl active:bg-black transition-all">NEXT WORD</button>
                </div>
            </div>

            <div id="quizUI" class="hidden flex-1 flex flex-col items-center justify-center w-full max-w-md mx-auto">
                <div class="w-full bg-white rounded-[2.5rem] shadow-xl p-10 mb-8 border border-slate-200 relative overflow-hidden text-center">
                    <div class="absolute top-0 left-0 w-full h-1 bg-slate-50"><div id="qBar" class="h-full bg-indigo-600 transition-all duration-300"></div></div>
                    <div class="flex items-center justify-center gap-3 mb-2">
                        <h3 id="qWord" class="text-5xl font-black text-slate-900 tracking-tighter"></h3>
                        <button onclick="app.speak(document.getElementById('qWord').textContent)" class="p-2 bg-slate-50 text-indigo-400 rounded-full active:bg-indigo-100"><i data-lucide="volume-2" class="w-6 h-6"></i></button>
                    </div>
                    <p id="qPron" class="text-slate-300 italic font-medium"></p>
                </div>
                <div id="qOptions" class="w-full grid grid-cols-1 gap-3"></div>
            </div>

            <div id="resultUI" class="hidden flex-1 flex flex-col items-center justify-center text-center p-6 bg-white rounded-[3rem] shadow-sm">
                <div class="w-24 h-24 bg-yellow-100 rounded-full flex items-center justify-center mb-6 shadow-inner"><i data-lucide="award" class="text-yellow-500 w-12 h-12"></i></div>
                <h2 class="text-4xl font-black text-slate-900 mb-1">Cleared!</h2>
                <p class="text-slate-500 font-bold mb-10 text-lg">점수: <span id="fScore" class="text-indigo-600 text-4xl">0</span></p>
                <div id="wrongReview" class="w-full max-w-xs bg-rose-50 rounded-2xl p-6 border border-rose-100 mb-8 hidden overflow-y-auto max-h-48 text-left">
                    <p class="text-rose-700 font-black text-[10px] mb-3 uppercase flex items-center gap-1"><i data-lucide="alert-circle" class="w-4 h-4"></i> Wrong Word Review</p>
                    <ul id="wrongList" class="space-y-2"></ul>
                </div>
                <button onclick="app.exitNow()" class="w-full max-w-xs h-16 bg-slate-900 text-white rounded-3xl font-black shadow-xl uppercase">Complete Session</button>
            </div>
        </div>
    </div>

    <aside id="dictPanel" class="fixed top-0 right-0 h-full w-full max-w-xs bg-white shadow-2xl z-[60] flex flex-col border-l border-slate-200">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
            <h3 class="font-black text-indigo-600 flex items-center gap-2"><i data-lucide="search" class="w-5 h-5"></i> Dictionary</h3>
            <button onclick="app.toggleDict()" class="p-2"><i data-lucide="x"></i></button>
        </div>
        <div class="p-4 border-b border-slate-100"><input type="text" id="dictInput" oninput="app.searchDict()" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-sm" placeholder="검색..."></div>
        <div id="dictList" class="flex-1 overflow-y-auto p-4 space-y-2"></div>
    </aside>

    <script>
        const app = {
            db: [], history: {}, sessionWords: [], sessionIdx: 0,
            score: 0, wrongs: [], isAns: false, mode: 'study', currentKey: '',
            audioUnlocked: false, ttsVoice: null, tx: 0, ty: 0,

            async init() {
                this.loadHistory();
                await this.autoFetchData();
                this.renderGrid();
                this.ri();
                if('speechSynthesis' in window) {
                    const setup = () => {
                        this.ttsVoice = window.speechSynthesis.getVoices().find(v => v.lang.startsWith('en')) || null;
                    };
                    window.speechSynthesis.onvoiceschanged = setup; setup();
                }
            },

            async autoFetchData() {
                const dot = document.getElementById('statusDot');
                const text = document.getElementById('statusText');
                this.db = [];
                for(let i=1; i<=20; i++) {
                    try {
                        // GitHub Pages의 최상위 폴더에서 먼저 검색
                        const res = await fetch(`./data_part${i}.json`);
                        if(res.ok) {
                            const json = await res.json();
                            this.db.push(...(Array.isArray(json) ? json : (json.words || [])));
                        }
                    } catch(e) {}
                }
                if(this.db.length > 0) {
                    this.db = this.db.filter((v,i,a)=>a.findIndex(t=>t.word===v.word)===i);
                    dot.className = "w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse";
                    text.textContent = "Data Linked";
                    document.getElementById('wordCountLabel').textContent = `${this.db.length.toLocaleString()} Words Active`;
                }
            },

            loadHistory() {
                const h = localStorage.getItem('v_h_vUltimate'); if(h) this.history = JSON.parse(h);
            },

            resetHistory() { if(confirm("학습 기록을 모두 지우시겠습니까?")) { localStorage.clear(); location.reload(); } },

            // 📊 필터링 및 정렬 로직
            renderGrid() {
                const grid = document.getElementById('daysGrid'); grid.innerHTML = '';
                const lvl = document.getElementById('courseLevel').value;
                const size = parseInt(document.getElementById('dailyAmount').value);
                const sort = document.getElementById('sortOrder').value;

                let list = lvl==='all' ? [...this.db] : this.db.filter(w=>w.level===lvl);
                
                // 정렬 적용
                if(sort === 'alpha') list.sort((a,b) => a.word.localeCompare(b.word));
                else if(sort === 'level') list.sort((a,b) => a.level.localeCompare(b.level));
                // 'root'인 경우 데이터 원본 순서(파일 로드 순서) 유지

                if(!list.length) return;

                const days = Math.ceil(list.length/size);
                let completed = 0;
                for(let i=0; i<days; i++){
                    const key = `${lvl}_${size}_${sort}_${i+1}`;
                    const score = this.history[key] || 0;
                    if(score > 0) completed++;
                    const card = document.createElement('div');
                    card.className = "bg-white p-5 rounded-[2rem] border border-slate-200 shadow-sm active:scale-95 transition-all relative overflow-hidden";
                    card.onclick = () => this.startSession(list.slice(i*size, (i+1)*size), i+1, key);
                    let check = score > 0 ? `<div class="absolute top-4 right-4 bg-emerald-500 text-white p-1 rounded-full"><i data-lucide="check" class="w-3 h-3"></i></div>` : '';
                    card.innerHTML = `${check}<div class="w-9 h-9 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400 font-black text-xs mb-4">${i+1}</div><h3 class="font-black text-slate-800 text-lg leading-tight">Day ${i+1}</h3><p class="text-[9px] font-black text-indigo-500 mt-1 uppercase">${score>0?score+'pts':'Start'}</p>`;
                    grid.appendChild(card);
                }
                const pct = days > 0 ? Math.round((completed/days)*100) : 0;
                document.getElementById('totalProgressText').textContent = `${pct}% Done`;
                document.getElementById('progressFill').style.transform = `scaleY(${pct/100})`;
                this.ri();
            },

            // 🔈 TTS
            unlockAudio() { if(!this.audioUnlocked) { window.speechSynthesis.speak(new SpeechSynthesisUtterance("")); this.audioUnlocked = true; } },
            speak(txt) {
                if(!txt || !('speechSynthesis' in window)) return;
                window.speechSynthesis.cancel();
                const ut = new SpeechSynthesisUtterance(txt);
                if(this.ttsVoice) ut.voice = this.ttsVoice;
                ut.lang = 'en-US'; ut.rate = 0.85; window.speechSynthesis.speak(ut);
            },

            // 📖 제스처 & 스와이프
            ts(e) { this.tx = e.changedTouches[0].screenX; this.ty = e.changedTouches[0].screenY; },
            te(e) {
                const dx = e.changedTouches[0].screenX - this.tx;
                const dy = e.changedTouches[0].screenY - this.ty;
                if(Math.abs(dx) < 60 || Math.abs(dy) > 100 || this.mode !== 'study') return;
                if(dx > 0) this.moveLeft(); else this.moveRight();
            },
            moveLeft() {
                if(this.sessionIdx > 0) {
                    const wrap = document.getElementById('cardWrapper');
                    wrap.classList.add('slide-out-right');
                    setTimeout(() => { this.sessionIdx--; this.renderStudy(); wrap.className = 'w-full slide-in'; }, 200);
                }
            },
            moveRight() {
                if(this.sessionIdx < this.sessionWords.length - 1) {
                    const wrap = document.getElementById('cardWrapper');
                    wrap.classList.add('slide-out-left');
                    setTimeout(() => { this.sessionIdx++; this.renderStudy(); wrap.className = 'w-full slide-in'; }, 200);
                } else { this.switchMode('quiz'); }
            },

            startSession(words, dayNum, key) {
                this.sessionWords = words; this.sessionIdx = 0; this.mode = 'study'; this.currentKey = key;
                document.getElementById('sessionLayer').classList.remove('hidden');
                document.getElementById('sessionDayLabel').textContent = `Day ${dayNum}`;
                document.getElementById('sessionTotal').textContent = words.length;
                this.renderStudy();
            },
            renderStudy() {
                const w = this.sessionWords[this.sessionIdx];
                document.getElementById('flashcard').classList.remove('flipped');
                document.getElementById('sessionIdx').textContent = this.sessionIdx+1;
                document.getElementById('lWord').textContent = w.word;
                document.getElementById('lPron').textContent = w.pronunciation;
                document.getElementById('lMeaning').textContent = w.meaning;
                document.getElementById('lStory').textContent = w.story;
                document.getElementById('lExEn').textContent = w.example.en;
                document.getElementById('lExKo').textContent = w.example.ko;
                
                // 어원 데이터 렌더링 (글자 크기 확대 및 스타일)
                document.getElementById('lEtym').innerHTML = w.parts.map(p=>`
                    <div class="etym-box shadow-sm">
                        <div class="flex justify-between items-center mb-1">
                            <span class="etym-label">${p.type}</span>
                            <span class="etym-text">${p.text}</span>
                        </div>
                        <p class="etym-meaning">${p.meaning}</p>
                    </div>
                `).join('');
                
                document.getElementById('nextBtn').textContent = this.sessionIdx === this.sessionWords.length - 1 ? "Start Quiz" : "Next Word";
                this.ri();
            },

            switchMode(m) {
                this.mode = m;
                ['studyUI','quizUI','resultUI'].forEach(ui => document.getElementById(ui).classList.add('hidden'));
                document.getElementById(`${m}UI`).classList.remove('hidden');
                document.getElementById('mode-study').className = m==='study'?"px-4 py-1 text-[10px] font-black rounded-md bg-white shadow-sm text-indigo-600":"px-4 py-1 text-[10px] font-black rounded-md text-slate-400";
                document.getElementById('mode-quiz').className = m==='quiz'?"px-4 py-1 text-[10px] font-black rounded-md bg-white shadow-sm text-rose-600":"px-4 py-1 text-[10px] font-black rounded-md text-slate-400";
                if(m==='quiz') { this.sessionIdx = 0; this.score = 0; this.wrongs = []; this.sessionWords = [...this.sessionWords].sort(()=>Math.random()-0.5); this.loadQuizQ(); }
                else if(m==='study') { this.sessionIdx = 0; this.renderStudy(); }
                this.ri();
            },
