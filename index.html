<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocaRoots Pro - Permanent Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.260.0/umd/lucide.min.js"></script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .option-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .tab-content { display: none; }
        .tab-content.active { display: flex; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .loading-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 z-30 shrink-0">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-xl shadow-lg">
                    <i data-lucide="database" class="text-white w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black text-slate-900 tracking-tight leading-none">Voca<span class="text-indigo-600">Roots</span></h1>
                    <span id="dbStatusText" class="text-[9px] font-bold text-rose-500 uppercase tracking-widest">No Data</span>
                </div>
            </div>
            
            <nav class="flex bg-slate-100 p-1 rounded-xl">
                <button onclick="app.switchTab('dict')" id="tab-dict" class="px-6 py-2 text-sm font-bold rounded-lg transition-all bg-white text-indigo-700 shadow-sm">사전</button>
                <button onclick="app.switchTab('study')" id="tab-study" class="px-6 py-2 text-sm font-bold rounded-lg transition-all text-slate-500">학습 & 퀴즈</button>
            </nav>

            <div class="flex items-center gap-2">
                <input type="file" id="loader" multiple accept=".json" class="hidden" onchange="app.importFiles(event)">
                <button onclick="document.getElementById('loader').click()" class="bg-slate-800 hover:bg-black text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-1.5 transition-all">
                    <i data-lucide="file-plus" class="w-4 h-4 text-indigo-400"></i> 데이터 로드
                </button>
                <button onclick="app.clearDB()" class="bg-rose-50 hover:bg-rose-100 text-rose-600 px-3 py-2 rounded-xl text-xs font-bold border border-rose-100 transition-all">
                    초기화
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 relative overflow-hidden max-w-7xl mx-auto w-full">
        
        <!-- Tab 1: Dictionary -->
        <div id="view-dict" class="tab-content active w-full h-full flex flex-col lg:flex-row">
            <aside class="w-full lg:w-[380px] border-r border-slate-200 bg-white flex flex-col shrink-0 lg:h-full h-[40vh]">
                <div class="p-4 border-b border-slate-100 bg-slate-50/50 space-y-3">
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-3 top-2.5 text-slate-400 w-4 h-4"></i>
                        <input type="text" id="searchInput" oninput="app.filter()" class="w-full pl-9 pr-4 py-2 bg-white border border-slate-200 rounded-xl text-sm font-medium outline-none" placeholder="단어, 뜻 검색...">
                    </div>
                    <div class="flex gap-1 p-1 bg-slate-200/50 rounded-lg">
                        <button onclick="app.setLevel('all')" id="f-all" class="flex-1 py-1 text-[10px] font-black rounded-md bg-white text-indigo-700 shadow-sm">전체</button>
                        <button onclick="app.setLevel('middle')" id="f-middle" class="flex-1 py-1 text-[10px] font-black rounded-md text-slate-500">중등</button>
                        <button onclick="app.setLevel('high')" id="f-high" class="flex-1 py-1 text-[10px] font-black rounded-md text-slate-500">고등</button>
                    </div>
                </div>
                <div id="wordList" class="flex-1 overflow-y-auto custom-scroll p-3 space-y-2 pb-20">
                    <div class="text-center py-20 text-slate-300">
                        <i data-lucide="download-cloud" class="w-12 h-12 mx-auto mb-4 opacity-20"></i>
                        <p class="font-bold text-sm">데이터 파일을 불러와주세요</p>
                    </div>
                </div>
            </aside>

            <section class="flex-1 bg-slate-50/50 overflow-y-auto custom-scroll p-4 lg:p-10">
                <div id="detailView" class="max-w-2xl mx-auto w-full bg-white rounded-[3rem] shadow-xl border border-slate-100 p-8 lg:p-12 hidden">
                    <!-- Detail UI -->
                </div>
                <div id="emptyView" class="h-full flex flex-col items-center justify-center text-slate-400 opacity-50">
                    <i data-lucide="book-open" class="w-16 h-16 mb-4"></i>
                    <p class="font-bold">목록에서 단어를 선택하세요</p>
                </div>
            </section>
        </div>

        <!-- Tab 2: Study -->
        <div id="view-study" class="tab-content w-full h-full flex flex-col bg-slate-50 overflow-y-auto custom-scroll p-6">
            <div class="max-w-5xl mx-auto w-full">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 gap-4 border-b border-slate-200 pb-6">
                    <div>
                        <h2 class="text-3xl font-black text-slate-900 tracking-tight">Daily Study</h2>
                        <p class="text-slate-500 font-medium">저장된 모든 데이터를 일별로 나누어 학습합니다.</p>
                    </div>
                    <div class="flex gap-2">
                        <select id="studySize" onchange="app.renderStudy()" class="bg-white border border-slate-200 px-4 py-2 rounded-xl text-sm font-bold outline-none shadow-sm">
                            <option value="20">20개씩</option>
                            <option value="30">30개씩</option>
                            <option value="50">50개씩</option>
                        </select>
                    </div>
                </div>
                <div id="daysGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 pb-20"></div>
            </div>
        </div>
    </main>

    <!-- Modal for Quiz -->
    <div id="quizModal" class="fixed inset-0 z-[100] bg-white hidden flex flex-col">
        <div class="bg-indigo-600 p-4 text-white flex justify-between items-center">
            <button onclick="app.hideQuiz()" class="font-bold text-sm opacity-80 hover:opacity-100">그만하기</button>
            <div class="text-center"><p id="qDayLabel" class="text-[10px] font-black opacity-60">DAY 01</p><p class="font-black">VOCA QUIZ</p></div>
            <div class="bg-indigo-800 px-3 py-1 rounded-lg text-xs font-black"><span id="qIdx">1</span> / <span id="qTotal">20</span></div>
        </div>
        <div class="flex-1 bg-slate-50 flex flex-col items-center justify-center p-6">
            <div class="max-w-xl w-full">
                <div class="bg-white rounded-[3rem] shadow-2xl p-12 text-center mb-8 relative overflow-hidden border border-slate-100">
                    <div class="absolute top-0 left-0 w-full h-1.5 bg-slate-100"><div id="qBar" class="h-full bg-indigo-500 transition-all" style="width:0%"></div></div>
                    <h2 id="qWord" class="text-6xl font-black text-slate-900 mb-2 tracking-tight"></h2>
                    <p id="qPron" class="text-slate-400 font-medium italic"></p>
                </div>
                <div id="qOptions" class="grid grid-cols-1 gap-3"></div>
            </div>
        </div>
    </div>

    <!-- Success Toast -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl z-[200] hidden flex items-center gap-2">
        <i data-lucide="check-circle-2" class="text-green-400 w-5 h-5"></i>
        <span id="toastText" class="font-bold text-sm"></span>
    </div>

    <script>
        /**
         * 💾 DATABASE ENGINE (IndexedDB)
         * stand-alone HTML 파일의 한계를 극복하는 브라우저 내장 데이터베이스 사용
         */
        const app = {
            db: [],
            filtered: [],
            currLevel: 'all',
            currWord: null,
            quizWords: [],
            qStep: 0,
            score: 0,
            wrongs: [],

            async init() {
                this.refreshIcons();
                // 브라우저 DB에서 기존 데이터 불러오기 시도
                await this.loadFromDisk();
                this.updateUI();
            },

            // 📥 파일 로드 및 브라우저 영구 저장
            async importFiles(e) {
                const files = e.target.files;
                if(!files.length) return;

                let newCount = 0;
                for(let file of files) {
                    const text = await file.text();
                    try {
                        const json = JSON.parse(text);
                        if(Array.isArray(json)) {
                            this.db.push(...json);
                            newCount += json.length;
                        }
                    } catch(err) { console.error("JSON 파싱 오류", err); }
                }

                // 중복 제거
                this.db = this.db.filter((v,i,a)=>a.findIndex(t=>t.word===v.word)===i);
                
                // 브라우저 데이터베이스에 저장 (새로고침해도 유지됨)
                localStorage.setItem('vocaroot_db', JSON.stringify(this.db));
                
                this.showToast(`성공! 총 ${this.db.length}개의 단어가 브라우저에 저장되었습니다.`);
                this.updateUI();
                e.target.value = '';
            },

            async loadFromDisk() {
                const saved = localStorage.getItem('vocaroot_db');
                if(saved) {
                    this.db = JSON.parse(saved);
                }
            },

            clearDB() {
                if(confirm("브라우저에 저장된 모든 단어를 삭제하시겠습니까?")) {
                    localStorage.removeItem('vocaroot_db');
                    this.db = [];
                    this.updateUI();
                    location.reload();
                }
            },

            updateUI() {
                const status = document.getElementById('dbStatusText');
                if(this.db.length > 0) {
                    status.textContent = `${this.db.length} WORDS ACTIVE`;
                    status.className = "text-[9px] font-black text-emerald-500 uppercase tracking-widest";
                }
                this.filter();
                this.renderStudy();
                this.refreshIcons();
            },

            switchTab(mode) {
                document.getElementById('tab-dict').className = "px-6 py-2 text-sm font-bold rounded-lg transition-all text-slate-500";
                document.getElementById('tab-study').className = "px-6 py-2 text-sm font-bold rounded-lg transition-all text-slate-500";
                document.getElementById(`tab-${mode}`).className = "px-6 py-2 text-sm font-bold rounded-lg transition-all bg-white text-indigo-700 shadow-sm";
                
                document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
                document.getElementById(`view-${mode}`).classList.add('active');
                this.refreshIcons();
            },

            setLevel(lvl) {
                this.currLevel = lvl;
                ['all', 'middle', 'high'].forEach(l => {
                    document.getElementById(`f-${l}`).className = "flex-1 py-1 text-[10px] font-black rounded-md text-slate-500";
                });
                document.getElementById(`f-${lvl}`).className = "flex-1 py-1 text-[10px] font-black rounded-md bg-white text-indigo-700 shadow-sm";
                this.filter();
            },

            filter() {
                const q = document.getElementById('searchInput').value.toLowerCase();
                this.filtered = this.db.filter(i => {
                    const matchLevel = this.currLevel === 'all' || i.level === this.currLevel;
                    const matchText = (i.word + i.meaning).toLowerCase().includes(q);
                    return matchLevel && matchText;
                });
                this.renderList();
            },

            renderList() {
                const container = document.getElementById('wordList');
                container.innerHTML = '';
                if(this.filtered.length === 0) {
                    container.innerHTML = '<div class="text-center py-20 text-slate-300 font-bold text-sm">결과가 없습니다.</div>';
                    return;
                }
                this.filtered.slice(0, 100).forEach(w => {
                    const btn = document.createElement('button');
                    const active = this.currWord === w.word;
                    btn.className = `w-full text-left p-4 rounded-2xl border-2 transition-all ${active ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-white border-slate-100 hover:border-indigo-200'}`;
                    btn.onclick = () => this.showDetail(w);
                    btn.innerHTML = `<div class="font-black text-lg">${w.word}</div><div class="text-[10px] font-bold ${active?'text-indigo-200':'text-slate-400'} truncate">${w.meaning}</div>`;
                    container.appendChild(btn);
                });
            },

            showDetail(w) {
                this.currWord = w.word;
                document.getElementById('emptyView').classList.add('hidden');
                const card = document.getElementById('detailView');
                card.classList.remove('hidden');
                
                const lvlColor = w.level === 'middle' ? 'bg-blue-100 text-blue-700' : 'bg-purple-100 text-purple-700';

                card.innerHTML = `
                    <div class="text-center mb-10 relative">
                        <span class="absolute top-0 right-0 px-3 py-1 text-[9px] font-black rounded-lg ${lvlColor}">${w.level}</span>
                        <h2 class="text-6xl font-black text-slate-900 mb-2">${w.word}</h2>
                        <p class="text-slate-400 text-lg mb-6">${w.pronunciation}</p>
                        <div class="inline-block bg-indigo-50 px-8 py-3 rounded-2xl text-2xl font-black text-indigo-900">${w.meaning}</div>
                    </div>
                    <div class="mb-10 flex flex-wrap justify-center items-center gap-3">
                        ${w.parts.map((p, idx) => `
                            <div class="text-center min-w-[100px] p-3 rounded-2xl border-2 ${p.type==='root'?'bg-emerald-50 border-emerald-100 text-emerald-700':'bg-slate-50 border-slate-100 text-slate-500'}">
                                <div class="text-[9px] font-black uppercase mb-1 opacity-50">${p.type}</div>
                                <div class="text-xl font-black">${p.text}</div>
                                <div class="text-[10px] font-bold">${p.meaning}</div>
                            </div>
                            ${idx < w.parts.length -1 ? '<i data-lucide="plus" class="text-slate-200 w-4 h-4 mt-6"></i>' : ''}
                        `).join('')}
                    </div>
                    <div class="bg-amber-50 rounded-[2.5rem] p-8 border border-amber-100 relative overflow-hidden">
                        <i data-lucide="lightbulb" class="absolute -right-4 -bottom-4 w-32 h-32 text-amber-200/40"></i>
                        <h4 class="font-black text-amber-800 flex items-center gap-2 mb-2"><i data-lucide="sparkles" class="w-4 h-4"></i> 연상 스토리</h4>
                        <p class="text-amber-900/80 leading-relaxed font-bold text-lg">${w.story.replace(/('[^']+')/g, '<span class="text-amber-600">$1</span>')}</p>
                    </div>
                `;
                this.renderList();
                this.refreshIcons();
            },

            // --- QUIZ ---
            renderStudy() {
                const grid = document.getElementById('daysGrid');
                grid.innerHTML = '';
                if(!this.db.length) return;

                const size = parseInt(document.getElementById('studySize').value);
                const daysCount = Math.ceil(this.db.length / size);

                for(let i=0; i<daysCount; i++) {
                    const card = document.createElement('div');
                    card.className = "bg-white p-6 rounded-3xl border border-slate-200 shadow-sm hover:shadow-xl transition-all group cursor-pointer";
                    card.onclick = () => this.startQuiz(i, size);
                    card.innerHTML = `
                        <div class="w-10 h-10 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-600 font-black mb-4 group-hover:bg-indigo-600 group-hover:text-white transition-all">${i+1}</div>
                        <h3 class="text-xl font-black text-slate-900">Day ${i+1}</h3>
                        <p class="text-xs font-bold text-slate-400 mt-1">${size} Words</p>
                    `;
                    grid.appendChild(card);
                }
            },

            startQuiz(dayIdx, size) {
                const start = dayIdx * size;
                this.quizWords = this.db.slice(start, start + size).sort(()=>Math.random()-0.5);
                this.qStep = 0; this.score = 0; this.wrongs = [];
                document.getElementById('quizModal').classList.remove('hidden');
                document.getElementById('qDayLabel').textContent = `DAY ${dayIdx+1}`;
                document.getElementById('qTotal').textContent = this.quizWords.length;
                this.loadQ();
            },

            loadQ() {
                if(this.qStep >= this.quizWords.length) return this.showResult();
                this.isAnswered = false;
                const w = this.quizWords[this.qStep];
                document.getElementById('qIdx').textContent = this.qStep + 1;
                document.getElementById('qWord').textContent = w.word;
                document.getElementById('qPron').textContent = w.pronunciation;
                document.getElementById('qBar').style.width = `${((this.qStep)/this.quizWords.length)*100}%`;

                let opts = [{t: w.meaning, c: true}];
                let pool = this.db.filter(i=>i.word!==w.word).sort(()=>Math.random()-0.5);
                for(let i=0; i<3; i++) opts.push({t: pool[i].meaning, c: false});
                opts.sort(()=>Math.random()-0.5);

                const container = document.getElementById('qOptions');
                container.innerHTML = '';
                opts.forEach((o, idx) => {
                    const b = document.createElement('button');
                    b.className = "option-btn w-full text-left p-5 rounded-2xl border-2 border-slate-200 bg-white font-black text-lg text-slate-700 flex items-center";
                    b.innerHTML = `<span class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center mr-4 text-xs text-slate-400 font-black">${idx+1}</span> ${o.t}`;
                    b.onclick = () => this.check(b, o.c, w);
                    container.appendChild(b);
                });
            },

            check(el, correct, w) {
                if(this.isAnswered) return;
                this.isAnswered = true;
                if(correct) {
                    el.className = "option-btn w-full text-left p-5 rounded-2xl border-2 border-emerald-500 bg-emerald-50 font-black text-lg text-emerald-700 flex items-center scale-[1.02] shadow-md";
                    this.score += Math.round(100/this.quizWords.length);
                } else {
                    el.className = "option-btn w-full text-left p-5 rounded-2xl border-2 border-rose-500 bg-rose-50 font-black text-lg text-rose-700 flex items-center shadow-md";
                    this.wrongs.push(w);
                    document.querySelectorAll('.option-btn').forEach(b=>{ if(b.textContent.includes(w.meaning)) b.classList.add('border-emerald-500','bg-emerald-50'); });
                }
                setTimeout(()=>{ this.qStep++; this.loadQ(); }, 1200);
            },

            showResult() {
                document.getElementById('resultScreen').classList.remove('hidden');
                document.getElementById('finalScore').textContent = this.wrongs.length === 0 ? 100 : this.score;
                const box = document.getElementById('reviewBox');
                const list = document.getElementById('wrongList');
                list.innerHTML = '';
                if(this.wrongs.length > 0) {
                    box.classList.remove('hidden');
                    this.wrongs.forEach(w => { list.innerHTML += `<li class="bg-white p-3 rounded-xl border border-rose-100"><div class="font-black text-slate-900">${w.word}</div><div class="text-rose-500 text-xs font-bold">${w.meaning}</div></li>`; });
                } else box.classList.add('hidden');
                this.refreshIcons();
            },

            hideQuiz() {
                document.getElementById('quizModal').classList.add('hidden');
                document.getElementById('resultScreen').classList.add('hidden');
            },

            showToast(msg) {
                const t = document.getElementById('toast');
                document.getElementById('toastText').textContent = msg;
                t.classList.remove('hidden');
                setTimeout(()=>t.classList.add('hidden'), 3000);
            },

            refreshIcons() { if(window.lucide) window.lucide.createIcons(); }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>

```
