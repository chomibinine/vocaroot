<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VocaRoots Pro - Mobile Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- 아이콘 라이브러리 (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; background-color: #f8fafc; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* 카드 래퍼 및 스와이프 애니메이션 */
        #cardWrapper { position: relative; width: 100%; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .flip-card { perspective: 1000px; width: 100%; height: 520px; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        
        .flip-card-front, .flip-card-back { 
            position: absolute; width: 100%; height: 100%; 
            -webkit-backface-visibility: hidden; backface-visibility: hidden; 
            border-radius: 2.5rem; display: flex; flex-direction: column; 
            box-shadow: 0 15px 40px -10px rgb(0 0 0 / 0.15); border: 1px solid #e2e8f0; 
            background: white; overflow: hidden;
        }
        
        /* 카드 뒷면 레이아웃 강제 교정 */
        .flip-card-front { align-items: center; justify-content: center; padding: 2rem; }
        .flip-card-back { 
            transform: rotateY(180deg); 
            align-items: stretch; justify-content: flex-start; 
            padding: 1.5rem; overflow-y: auto; 
        }

        /* 슬라이드(스와이프) 효과 */
        .slide-out-left { transform: translateX(-120%) rotate(-10deg); opacity: 0; }
        .slide-out-right { transform: translateX(120%) rotate(10deg); opacity: 0; }
        .slide-in { animation: slideIn 0.4s ease-out forwards; }
        @keyframes slideIn { from { transform: scale(0.95) translateY(30px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

        #dictPanel { transform: translateX(100%); transition: transform 0.3s ease; }
        #dictPanel.open { transform: translateX(0); }
        .btn-active:active { transform: scale(0.9); opacity: 0.7; }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col overflow-hidden select-none" onclick="app.unlockAudio()">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 z-40 shrink-0 px-4 py-3 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-xl shadow-md"><i data-lucide="graduation-cap" class="text-white w-5 h-5"></i></div>
                <h1 class="text-lg font-black text-slate-900 tracking-tight leading-none">Voca<span class="text-indigo-600">Roots</span></h1>
            </div>
            <div class="flex items-center gap-2">
                <div id="loadStatus" class="flex items-center gap-1.5 bg-slate-50 px-3 py-1.5 rounded-full border border-slate-200">
                    <div class="w-2 h-2 bg-slate-300 rounded-full" id="statusDot"></div>
                    <span id="statusText" class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Searching...</span>
                </div>
                <button onclick="app.toggleDict()" class="p-2 rounded-xl bg-slate-50 text-slate-400 active:text-indigo-600 btn-active"><i data-lucide="search" class="w-5 h-5"></i></button>
            </div>
        </div>
    </header>

    <!-- 대시보드 (진도 관리) -->
    <main id="mainDashboard" class="flex-1 overflow-y-auto p-4 pb-24">
        <div class="max-w-4xl mx-auto">
            <div class="mb-6 flex items-center justify-between bg-white p-5 rounded-[2rem] border border-slate-200 shadow-sm">
                <div>
                    <h2 id="totalProgressText" class="text-2xl font-black text-slate-900 leading-none">0% Done</h2>
                    <span id="wordCountLabel" class="text-[11px] font-bold text-indigo-500 uppercase tracking-widest mt-1.5 block">No Words Found</span>
                </div>
                <div class="w-12 h-12 bg-indigo-50 rounded-full flex items-center justify-center relative overflow-hidden">
                    <div id="progressFill" class="absolute bottom-0 left-0 w-full bg-indigo-500 origin-bottom transition-transform duration-700" style="height: 100%; transform: scaleY(0);"></div>
                    <i data-lucide="award" class="w-6 h-6 text-indigo-100 relative z-10"></i>
                </div>
            </div>

            <!-- 학습 필터 -->
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-white p-3 rounded-2xl border border-slate-200">
                    <p class="text-[9px] font-black text-slate-300 uppercase mb-1 text-center">Course</p>
                    <select id="courseLevel" onchange="app.renderGrid()" class="w-full bg-transparent font-black text-sm outline-none text-center">
                        <option value="all">전체 통합</option>
                        <option value="middle">중학 필수</option>
                        <option value="high">고등 심화</option>
                    </select>
                </div>
                <div class="bg-white p-3 rounded-2xl border border-slate-200">
                    <p class="text-[9px] font-black text-slate-300 uppercase mb-1 text-center">Daily Amount</p>
                    <select id="dailyAmount" onchange="app.renderGrid()" class="w-full bg-transparent font-black text-sm outline-none text-center">
                        <option value="10">10개씩</option>
                        <option value="20" selected>20개씩</option>
                        <option value="30">30개씩</option>
                    </select>
                </div>
            </div>

            <div id="daysGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4"></div>
            
            <!-- 로딩 오류 시 버튼 노출 -->
            <div id="manualLoadUI" class="hidden py-20 text-center">
                <button onclick="document.getElementById('fileLoader').click()" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black shadow-lg btn-active">수동 데이터 로드</button>
                <input type="file" id="fileLoader" multiple accept=".json" class="hidden" onchange="app.importData(event)">
                <p class="text-slate-400 text-xs mt-4">데이터를 자동으로 찾지 못했습니다.</p>
            </div>
        </div>
    </main>

    <!-- 세션 화면 -->
    <div id="sessionLayer" class="fixed inset-0 z-[100] bg-white hidden flex flex-col overflow-hidden">
        <div class="bg-white border-b border-slate-100 px-5 py-4 flex justify-between items-center shrink-0">
            <button onclick="app.confirmExit()" class="text-slate-400 p-2 btn-active"><i data-lucide="home" class="w-7 h-7"></i></button>
            <div class="text-center">
                <span id="sessionDayLabel" class="text-[10px] font-black text-indigo-400 uppercase tracking-widest leading-none">DAY 01</span>
                <div class="flex bg-slate-100 p-1 rounded-lg mt-1">
                    <button id="mode-study" onclick="app.switchMode('study')" class="px-3 py-0.5 text-[9px] font-black rounded-md bg-white shadow-sm text-indigo-600 transition-all">STUDY</button>
                    <button id="mode-quiz" onclick="app.switchMode('quiz')" class="px-3 py-0.5 text-[9px] font-black rounded-md text-slate-400 transition-all">QUIZ</button>
                </div>
            </div>
            <div class="text-xs font-black min-w-[50px] text-right"><span id="sessionIdx" class="text-indigo-600">1</span><span class="text-slate-200">/</span><span id="sessionTotal" class="text-slate-400">20</span></div>
        </div>

        <div id="sessionContent" class="flex-1 bg-slate-50 flex flex-col p-4 relative overflow-hidden" ontouchstart="app.ts(event)" ontouchend="app.te(event)">
            
            <!-- 카드 영역 -->
            <div id="studyUI" class="flex-1 flex flex-col items-center justify-center w-full max-w-md mx-auto">
                <div id="cardWrapper" class="w-full">
                    <div class="flip-card cursor-pointer" id="flashcard" onclick="this.classList.toggle('flipped')">
                        <div class="flip-card-inner">
                            <!-- 앞면 -->
                            <div class="flip-card-front">
                                <span class="text-indigo-300 text-[11px] font-black uppercase tracking-[0.4em] mb-4">Tap to Flip</span>
                                <h2 id="lWord" class="text-6xl font-black text-slate-900 tracking-tighter mb-1"></h2>
                                <p id="lPron" class="text-slate-300 text-lg italic mb-10"></p>
                                
                                <button onclick="event.stopPropagation(); app.speak(document.getElementById('lWord').textContent)" 
                                        class="p-8 bg-indigo-600 text-white rounded-full shadow-2xl active:scale-90 btn-active flex items-center justify-center">
                                    <i data-lucide="volume-2" class="w-12 h-12"></i>
                                </button>
                                
                                <div class="absolute bottom-10 flex items-center gap-2 text-[10px] font-black text-slate-200 uppercase tracking-widest">
                                    <i data-lucide="arrow-left-right" class="w-3 h-3"></i> Swipe to Move
                                </div>
                            </div>
                            <!-- 뒷면 (모든 정보 노출 고정) -->
                            <div class="flip-card-back custom-scroll space-y-5">
                                <div class="text-center">
                                    <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest mb-1">Meaning</p>
                                    <div class="bg-indigo-600 text-white px-8 py-2.5 rounded-2xl text-2xl font-black inline-block shadow-lg" id="lMeaning"></div>
                                </div>
                                
                                <div>
                                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 flex items-center gap-1.5"><i data-lucide="layers" class="w-3.5 h-3.5"></i> Etymology Analysis</p>
                                    <div id="lEtym" class="flex flex-wrap gap-2"></div>
                                </div>

                                <div>
                                    <div class="bg-amber-50 p-4 rounded-2xl border border-amber-100 shadow-sm">
                                        <p class="text-amber-800 font-black text-[10px] uppercase mb-1 flex items-center gap-1.5"><i data-lucide="sparkles" class="w-3.5 h-3.5"></i> Remember Story</p>
                                        <p id="lStory" class="text-amber-900 text-[14px] font-bold leading-relaxed"></p>
                                    </div>
                                </div>

                                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 relative shadow-sm">
                                    <div class="flex justify-between items-center mb-1">
                                        <p class="text-slate-400 font-black text-[10px] uppercase">Example</p>
                                        <button onclick="event.stopPropagation(); app.speak(document.getElementById('lExEn').textContent)" class="text-indigo-500 active:scale-125"><i data-lucide="volume-1" class="w-5 h-5"></i></button>
                                    </div>
                                    <p id="lExEn" class="text-slate-800 font-black italic text-[15px] mb-1 leading-snug"></p>
                                    <p id="lExKo" class="text-slate-500 text-[12px] font-bold"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- 하단 내비 -->
                <div class="mt-8 flex gap-4 w-full">
                    <button onclick="app.moveLeft()" class="h-16 w-16 bg-white border border-slate-200 rounded-3xl flex items-center justify-center text-slate-400 btn-active shadow-sm"><i data-lucide="chevron-left" class="w-8 h-8"></i></button>
                    <button id="nextBtn" onclick="app.moveRight()" class="flex-1 h-16 bg-slate-900 text-white rounded-3xl font-black shadow-xl active:bg-black transition-all">NEXT WORD</button>
                </div>
            </div>

            <!-- 퀴즈 화면 -->
            <div id="quizUI" class="hidden flex-1 flex flex-col items-center justify-center w-full max-w-md mx-auto">
                <div class="w-full bg-white rounded-[2.5rem] shadow-xl p-10 mb-8 border border-slate-200 relative overflow-hidden text-center">
                    <div class="absolute top-0 left-0 w-full h-1 bg-slate-50"><div id="qBar" class="h-full bg-indigo-600 transition-all duration-300"></div></div>
                    <div class="flex items-center justify-center gap-3 mb-2">
                        <h3 id="qWord" class="text-5xl font-black text-slate-900 tracking-tighter"></h3>
                        <button onclick="app.speak(document.getElementById('qWord').textContent)" class="p-2.5 bg-slate-50 text-indigo-400 rounded-full active:bg-indigo-100"><i data-lucide="volume-2" class="w-6 h-6"></i></button>
                    </div>
                    <p id="qPron" class="text-slate-300 italic font-medium"></p>
                </div>
                <div id="qOptions" class="w-full grid grid-cols-1 gap-3"></div>
            </div>

            <!-- 결과 화면 -->
            <div id="resultUI" class="hidden flex-1 flex flex-col items-center justify-center text-center p-6 bg-white rounded-[3rem] shadow-sm">
                <div class="w-24 h-24 bg-yellow-100 rounded-full flex items-center justify-center mb-6 shadow-inner"><i data-lucide="award" class="text-yellow-500 w-12 h-12"></i></div>
                <h2 class="text-4xl font-black text-slate-900 mb-1">Cleared!</h2>
                <p class="text-slate-500 font-bold mb-10">점수: <span id="fScore" class="text-indigo-600 text-4xl">0</span></p>
                <div id="wrongReview" class="w-full max-w-xs bg-rose-50 rounded-2xl p-6 border border-rose-100 mb-8 hidden overflow-y-auto max-h-48 text-left">
                    <p class="text-rose-700 font-black text-[10px] mb-3 uppercase flex items-center gap-1"><i data-lucide="alert-circle" class="w-4 h-4"></i> Wrong Words</p>
                    <ul id="wrongList" class="space-y-2"></ul>
                </div>
                <button onclick="app.exitNow()" class="w-full max-w-xs h-16 bg-slate-900 text-white rounded-3xl font-black shadow-xl uppercase">Complete Session</button>
            </div>
        </div>
    </div>

    <!-- 사이드 사전 -->
    <div id="dictOverlay" onclick="app.toggleDict()" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[50] hidden opacity-0 transition-opacity"></div>
    <aside id="dictPanel" class="fixed top-0 right-0 h-full w-full max-w-xs bg-white shadow-2xl z-[60] flex flex-col">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center"><h3 class="font-black text-indigo-600 flex items-center gap-2"><i data-lucide="book" class="w-5 h-5"></i> Dictionary</h3><button onclick="app.toggleDict()" class="p-2"><i data-lucide="x"></i></button></div>
        <div id="dictList" class="flex-1 overflow-y-auto p-4 space-y-2"></div>
    </aside>

    <!-- 중단 확인 팝업 -->
    <div id="exitModal" class="fixed inset-0 z-[200] bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-6">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-xs text-center shadow-2xl">
            <h4 class="text-xl font-black text-slate-900 mb-2">Stop Session?</h4>
            <div class="grid grid-cols-2 gap-3 mt-8">
                <button onclick="document.getElementById('exitModal').classList.add('hidden')" class="py-4 bg-slate-100 rounded-2xl font-black text-slate-500 text-sm">Resume</button>
                <button onclick="app.exitNow()" class="py-4 bg-rose-500 rounded-2xl font-black text-white text-sm">Exit</button>
            </div>
        </div>
    </div>

    <script>
        const app = {
            db: [], history: {}, sessionWords: [], sessionIdx: 0,
            score: 0, wrongs: [], isAns: false, mode: 'study', currentKey: '',
            audioUnlocked: false, ttsVoice: null, tx: 0, ty: 0,

            async init() {
                this.loadHistory();
                await this.autoFetchData(); // 자동 로딩 시작
                this.renderGrid();
                this.ri();
                if('speechSynthesis' in window) {
                    const setup = () => { this.ttsVoice = window.speechSynthesis.getVoices().find(v => v.lang.startsWith('en')) || null; };
                    window.speechSynthesis.onvoiceschanged = setup; setup();
                }
            },

            // 🤖 경로 자동 탐색 (GitHub 루트 혹은 vocaroot 폴더 모두 확인)
            async autoFetchData() {
                const dot = document.getElementById('statusDot');
                const text = document.getElementById('statusText');
                this.db = [];
                let success = false;

                // 1~20 파트까지 시도
                for(let i=1; i<=20; i++) {
                    const paths = [`./data_part${i}.json`, `./vocaroot/data_part${i}.json`];
                    for(let p of paths) {
                        try {
                            const res = await fetch(p);
                            if(res.ok) {
                                const json = await res.json();
                                this.db.push(...(Array.isArray(json) ? json : (json.words || [])));
                                success = true; break;
                            }
                        } catch(e) {}
                    }
                }

                if(success) {
                    this.db = this.db.filter((v,i,a)=>a.findIndex(t=>t.word===v.word)===i);
                    dot.className = "w-2 h-2 bg-emerald-500 rounded-full animate-pulse";
                    text.textContent = "Data Linked";
                    text.className = "text-[10px] font-black text-emerald-600 uppercase";
                    document.getElementById('wordCountLabel').textContent = `${this.db.length.toLocaleString()} Words Ready`;
                } else {
                    document.getElementById('manualLoadUI').classList.remove('hidden');
                }
            },

            loadHistory() {
                const h = localStorage.getItem('v_h_vFinal'); if(h) this.history = JSON.parse(h);
                const m = localStorage.getItem('v_m_vFinal'); if(m) this.db = JSON.parse(m);
            },

            async importData(e) {
                const files = e.target.files;
                for(let f of files) {
                    try {
                        const txt = await f.text();
                        const json = JSON.parse(txt);
                        this.db.push(...(Array.isArray(json) ? json : (json.words || [])));
                    } catch(err) {}
                }
                this.db = this.db.filter((v,i,a)=>a.findIndex(t=>t.word===v.word)===i);
                localStorage.setItem('v_m_vFinal', JSON.stringify(this.db));
                location.reload();
            },

            resetHistory() { if(confirm("초기화?")) { localStorage.clear(); location.reload(); } },

            renderGrid() {
                const grid = document.getElementById('daysGrid'); grid.innerHTML = '';
                const lvl = document.getElementById('courseLevel').value;
                const size = parseInt(document.getElementById('dailyAmount').value);
                let list = lvl==='all'?this.db:this.db.filter(w=>w.level===lvl);
                if(!list.length) return;

                const days = Math.ceil(list.length/size);
                let completed = 0;
                for(let i=0; i<days; i++){
                    const key = `${lvl}_${size}_${i+1}`;
                    const score = this.history[key] || 0;
                    if(score > 0) completed++;
                    const card = document.createElement('div');
                    card.className = "bg-white p-5 rounded-[2rem] border border-slate-200 shadow-sm active:scale-95 transition-all relative overflow-hidden";
                    card.onclick = () => this.startSession(list.slice(i*size, (i+1)*size), i+1, key);
                    let check = score > 0 ? `<div class="absolute top-4 right-4 bg-emerald-500 text-white p-1 rounded-full"><i data-lucide="check" class="w-3.5 h-3.5"></i></div>` : '';
                    card.innerHTML = `${check}<div class="w-9 h-9 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400 font-black text-xs mb-4">${i+1}</div><h3 class="font-black text-slate-800 text-lg leading-tight">Day ${i+1}</h3><p class="text-[9px] font-black text-indigo-500 mt-1 uppercase">${score>0?score+'pts':'Start'}</p>`;
                    grid.appendChild(card);
                }
                const pct = days > 0 ? Math.round((completed/days)*100) : 0;
                document.getElementById('totalProgressText').textContent = `${pct}% Done`;
                document.getElementById('progressFill').style.transform = `scaleY(${pct/100})`;
                this.ri();
            },

            unlockAudio() { if(!this.audioUnlocked) { window.speechSynthesis.speak(new SpeechSynthesisUtterance("")); this.audioUnlocked = true; } },
            speak(txt) {
                if(!txt || !('speechSynthesis' in window)) return;
                window.speechSynthesis.cancel();
                const ut = new SpeechSynthesisUtterance(txt);
                if(this.ttsVoice) ut.voice = this.ttsVoice;
                ut.lang = 'en-US'; ut.rate = 0.85; window.speechSynthesis.speak(ut);
            },

            ts(e) { this.tx = e.changedTouches[0].screenX; this.ty = e.changedTouches[0].screenY; },
            te(e) {
                const dx = e.changedTouches[0].screenX - this.tx;
                const dy = e.changedTouches[0].screenY - this.ty;
                if(Math.abs(dx) < 60 || Math.abs(dy) > 100 || this.mode !== 'study') return;
                if(dx > 0) this.moveLeft(); else this.moveRight();
            },
            moveLeft() { if(this.sessionIdx > 0) { const wrap = document.getElementById('cardWrapper'); wrap.classList.add('slide-out-right'); setTimeout(() => { this.sessionIdx--; this.renderStudy(); wrap.className = 'w-full slide-in'; }, 200); } },
            moveRight() { if(this.sessionIdx < this.sessionWords.length - 1) { const wrap = document.getElementById('cardWrapper'); wrap.classList.add('slide-out-left'); setTimeout(() => { this.sessionIdx++; this.renderStudy(); wrap.className = 'w-full slide-in'; }, 200); } else { this.switchMode('quiz'); } },

            startSession(words, dayNum, key) { this.sessionWords = words; this.sessionIdx = 0; this.mode = 'study'; this.currentKey = key; document.getElementById('sessionLayer').classList.remove('hidden'); document.getElementById('sessionDayLabel').textContent = `Day ${dayNum}`; document.getElementById('sessionTotal').textContent = words.length; this.renderStudy(); },
            renderStudy() {
                const w = this.sessionWords[this.sessionIdx]; document.getElementById('flashcard').classList.remove('flipped'); document.getElementById('sessionIdx').textContent = this.sessionIdx+1;
                document.getElementById('lWord').textContent = w.word; document.getElementById('lPron').textContent = w.pronunciation; document.getElementById('lMeaning').textContent = w.meaning; document.getElementById('lStory').textContent = w.story; document.getElementById('lExEn').textContent = w.example.en; document.getElementById('lExKo').textContent = w.example.ko;
                document.getElementById('lEtym').innerHTML = w.parts.map(p=>`<div class="p-2.5 bg-slate-50 rounded-2xl border border-slate-100 flex-1 min-w-[75px] text-center shadow-sm"><div class="text-[7px] font-black text-slate-300 uppercase leading-none mb-1">${p.type}</div><div class="text-[13px] font-black text-indigo-700 leading-tight">${p.text}</div><div class="text-[9px] font-bold text-slate-500 mt-1 leading-none">${p.meaning}</div></div>`).join('');
                document.getElementById('nextBtn').textContent = this.sessionIdx === this.sessionWords.length - 1 ? "QUIZ" : "NEXT"; this.ri();
            },

            switchMode(m) { this.mode = m; ['studyUI','quizUI','resultUI'].forEach(ui => document.getElementById(ui).classList.add('hidden')); document.getElementById(`${m}UI`).classList.remove('hidden'); document.getElementById('mode-study').className = m==='study'?"px-4 py-1 text-[10px] font-black rounded-md bg-white shadow-sm text-indigo-600":"px-4 py-1 text-[10px] font-black rounded-md text-slate-400"; document.getElementById('mode-quiz').className = m==='quiz'?"px-4 py-1 text-[10px] font-black rounded-md bg-white shadow-sm text-rose-600":"px-4 py-1 text-[10px] font-black rounded-md text-slate-400"; if(m==='quiz') { this.sessionIdx = 0; this.score = 0; this.wrongs = []; this.sessionWords = [...this.sessionWords].sort(()=>Math.random()-0.5); this.loadQuizQ(); } else if(m==='study') { this.sessionIdx = 0; this.renderStudy(); } this.ri(); },
            loadQuizQ() { if(this.sessionIdx >= this.sessionWords.length) return this.showResult(); this.isAns = false; const w = this.sessionWords[this.sessionIdx]; document.getElementById('sessionIdx').textContent = this.sessionIdx+1; document.getElementById('qWord').textContent = w.word; document.getElementById('qPron').textContent = w.pronunciation; document.getElementById('qBar').style.width = `${(this.sessionIdx/this.sessionWords.length)*100}%`; let opts = [{t:w.meaning, c:true}].concat(this.db.filter(i=>i.word!==w.word).sort(()=>Math.random()-0.5).slice(0,3).map(i=>({t:i.meaning,c:false}))).sort(()=>Math.random()-0.5); const container = document.getElementById('qOptions'); container.innerHTML = ''; opts.forEach((o, i) => { const btn = document.createElement('button'); btn.className = "option-btn w-full text-left p-5 rounded-[1.5rem] border-2 border-slate-200 bg-white font-black text-slate-700 flex items-center transition-all shadow-sm"; btn.innerHTML = `<span class="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center mr-4 text-xs font-black text-slate-300">${i+1}</span> ${o.t}`; btn.onclick = () => this.checkQuiz(btn, o.c, w); container.appendChild(btn); }); },
            checkQuiz(el, correct, w) { if(this.isAns) return; this.isAns = true; if(correct) { el.className = "option-btn w-full text-left p-5 rounded-[1.5rem] border-2 border-emerald-500 bg-emerald-50 font-black text-emerald-700 shadow-lg scale-[1.02] flex items-center"; this.score += Math.round(100/this.sessionWords.length); } else { el.className = "option-btn w-full text-left p-5 rounded-[1.5rem] border-2 border-rose-500 bg-rose-50 font-black text-rose-700 flex items-center"; this.wrongs.push(w); document.querySelectorAll('.option-btn').forEach(b => { if(b.textContent.includes(w.meaning)) b.classList.add('border-emerald-500','bg-emerald-50'); }); } setTimeout(()=>{ this.sessionIdx++; this.loadQuizQ(); }, 1000); },
            showResult() { this.mode = 'result'; ['studyUI','quizUI','resultUI'].forEach(ui => document.getElementById(ui).classList.add('hidden')); document.getElementById('resultUI').classList.remove('hidden'); const cur = this.wrongs.length===0?100:this.score; document.getElementById('fScore').textContent = cur; if(!this.history[this.currentKey] || cur > this.history[this.currentKey]) { this.history[this.currentKey] = cur; localStorage.setItem('v_h_vFinal', JSON.stringify(this.history)); } const list = document.getElementById('wrongList'); list.innerHTML = ''; if(this.wrongs.length > 0) { document.getElementById('wrongReview').classList.remove('hidden'); this.wrongs.forEach(w => { list.innerHTML += `<li class="bg-white p-3 rounded-xl border border-rose-100 flex flex-col shadow-sm"><span class="font-black text-slate-800 text-sm">${w.word}</span><span class="text-rose-500 text-[10px] font-bold">${w.meaning}</span></li>`; }); } else document.getElementById('wrongReview').classList.add('hidden'); this.ri(); },

            confirmExit() { document.getElementById('exitModal').classList.remove('hidden'); },
            exitNow() { document.getElementById('exitModal').classList.add('hidden'); document.getElementById('sessionLayer').classList.add('hidden'); this.renderGrid(); },
            toggleDict() { const p = document.getElementById('dictPanel'); const o = document.getElementById('dictOverlay'); const isOpen = p.classList.toggle('open'); o.classList.toggle('hidden', !isOpen); setTimeout(()=>o.style.opacity = isOpen ? '1' : '0', 10); },
            searchDict() { /* 사전 검색 로직 생략 (기능 동일) */ },

        };

        window.onload = () => app.init();
