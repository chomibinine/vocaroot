<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VocaRoots Pro - Auto Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- 아이콘 로드 가속 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; background-color: #f8fafc; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* 카드 래퍼 및 애니메이션 */
        #cardWrapper { position: relative; width: 100%; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .flip-card { perspective: 1000px; width: 100%; height: 500px; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        
        .flip-card-front, .flip-card-back { 
            position: absolute; width: 100%; height: 100%; 
            -webkit-backface-visibility: hidden; backface-visibility: hidden; 
            border-radius: 2.5rem; display: flex; flex-direction: column; 
            box-shadow: 0 15px 35px -5px rgb(0 0 0 / 0.1); border: 1px solid #e2e8f0; 
            background: white; overflow: hidden;
        }
        
        /* 앞면 중앙 정렬 */
        .flip-card-front { align-items: center; justify-content: center; padding: 2rem; }
        
        /* 뒷면 레이아웃 수정: 위에서 아래로 차곡차곡 */
        .flip-card-back { 
            transform: rotateY(180deg); 
            align-items: stretch; justify-content: flex-start; 
            padding: 1.5rem; overflow-y: auto; 
        }

        /* 스와이프 효과 */
        .slide-out-left { transform: translateX(-120%) rotate(-10deg); opacity: 0; }
        .slide-out-right { transform: translateX(120%) rotate(10deg); opacity: 0; }
        .slide-in { animation: slideIn 0.4s ease-out forwards; }
        @keyframes slideIn { from { transform: scale(0.9) translateY(30px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

        #dictPanel { transform: translateX(100%); transition: transform 0.3s ease; }
        #dictPanel.open { transform: translateX(0); }
        .btn-active:active { transform: scale(0.9); opacity: 0.7; }

        /* 로딩 애니메이션 */
        .loader-dots div { animation: loader-dots 0.6s infinite alternate; }
        .loader-dots div:nth-child(2) { animation-delay: 0.2s; }
        .loader-dots div:nth-child(3) { animation-delay: 0.4s; }
        @keyframes loader-dots { from { opacity: 0.1; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }
    </style>
</head>

    <!-- 세션 화면 (Full Screen) -->
    <div id="sessionLayer" class="fixed inset-0 z-[100] bg-white hidden flex flex-col overflow-hidden">

                                <div class="absolute bottom-8 flex items-center gap-1.5 text-[10px] font-black text-slate-200 uppercase tracking-widest">
                                    <i data-lucide="move-horizontal" class="w-3 h-3"></i> Swipe to Navigate

                            <!-- 뒷면: 뜻 + 어원 + 스토리 + 예문 -->

                                    <div id="lEtym" class="flex flex-wrap gap-2"></div>

                <h2 class="text-4xl font-black text-slate-900 mb-1">Cleared!</h2>
                <p class="text-slate-500 font-bold mb-10">점수: <span id="fScore" class="text-indigo-600 text-4xl">0</span></p>

    <!-- 사이드 사전 -->
    <div id="dictOverlay" onclick="app.toggleDict()" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[50] hidden opacity-0 transition-opacity"></div>
    <aside id="dictPanel" class="fixed top-0 right-0 h-full w-full max-w-xs bg-white shadow-2xl z-[60] flex flex-col">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center"><h3 class="font-black text-indigo-600 flex items-center gap-2"><i data-lucide="book" class="w-5 h-5"></i> Search</h3><button onclick="app.toggleDict()" class="p-2"><i data-lucide="x"></i></button></div>
        <div class="p-4"><input type="text" id="dictInput" oninput="app.searchDict()" class="w-full px-4 py-3 bg-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-sm" placeholder="단어 검색..."></div>
        <div id="dictList" class="flex-1 overflow-y-auto custom-scroll p-4 space-y-2"></div>
    </aside>

    <script>
        const app = {
            db: [], history: {}, sessionWords: [], sessionIdx: 0,
            score: 0, wrongs: [], isAns: false, mode: 'study', currentKey: '',
            audioUnlocked: false, ttsVoice: null, tx: 0, ty: 0,

            async init() {
                this.loadHistory();
                await this.autoFetchData(); // 자동 데이터 로딩
                this.renderGrid();
                this.ri();
                // TTS 엔진 로드
                if('speechSynthesis' in window) {
                    const setup = () => {
                        this.ttsVoice = window.speechSynthesis.getVoices().find(v => v.lang.startsWith('en')) || null;
                    };
                    window.speechSynthesis.onvoiceschanged = setup; setup();
                }
            },

            // 🤖 서버(vocaroot 폴더)에서 자동으로 데이터 긁어오기
            async autoFetchData() {
                const statusDot = document.getElementById('statusDot');
                const statusText = document.getElementById('statusText');
                const loaderUI = document.getElementById('loaderUI');
                
                let foundCount = 0;
                this.db = [];

                // 최대 20개 파트까지 자동 시도
                for(let i=1; i<=20; i++) {
                    try {
                        const response = await fetch(`./vocaroot/data_part${i}.json`);
                        if(response.ok) {
                            const data = await response.json();
                            const words = Array.isArray(data) ? data : (data.words || []);
                            this.db.push(...words);
                            foundCount++;
                        } else { break; } // 파일이 없으면 중단
                    } catch(err) { break; }
                }

                if(this.db.length > 0) {
                    this.db = this.db.filter((v,i,a)=>a.findIndex(t=>t.word===v.word)===i);
                    statusDot.className = "w-2 h-2 bg-emerald-500 rounded-full animate-pulse";
                    statusText.textContent = "Data Linked";
                    statusText.className = "text-[10px] font-black text-emerald-600 uppercase";
                    document.getElementById('wordCountLabel').textContent = `${this.db.length.toLocaleString()} Words Active`;
                    loaderUI.classList.add('hidden');
                } else {
                    statusText.textContent = "Offline / No Data";
                    document.getElementById('wordCountLabel').textContent = "Please Load Data Manually";
                    loaderUI.innerHTML = `<button onclick="document.getElementById('fileLoader').click()" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black shadow-lg">Load JSON Files</button>`;
                }
            },

            // 💾 수동 로드 지원
            async importData(e) {
                const files = e.target.files;
                for(let f of files) {
                    try {
                        const txt = await f.text();
                        const json = JSON.parse(txt);
                        this.db.push(...(Array.isArray(json) ? json : (json.words || [])));
                    } catch(err) {}
                }
                this.db = this.db.filter((v,i,a)=>a.findIndex(t=>t.word===v.word)===i);
                localStorage.setItem('vocaroot_manual_db', JSON.stringify(this.db));
                location.reload();
            },

            loadHistory() {
                const h = localStorage.getItem('vocaroot_h_vFinal');
                if(h) this.history = JSON.parse(h);
                const mdb = localStorage.getItem('vocaroot_manual_db');
                if(mdb) this.db = JSON.parse(mdb);
            },

            resetData() { if(confirm("초기화하시겠습니까?")) { localStorage.clear(); location.reload(); } },

            renderGrid() {
                const grid = document.getElementById('daysGrid'); grid.innerHTML = '';
                const lvl = document.getElementById('courseLevel').value;
                const size = parseInt(document.getElementById('dailyAmount').value);
                let list = lvl==='all'?this.db:this.db.filter(w=>w.level===lvl);
                if(!list.length) return;

                const days = Math.ceil(list.length/size);
                let completed = 0;
                for(let i=0; i<days; i++){
                    const key = `${lvl}_${size}_${i+1}`;
                    const score = this.history[key] || 0;
                    if(score > 0) completed++;
                    const card = document.createElement('div');
                    card.className = "bg-white p-5 rounded-[2rem] border border-slate-200 shadow-sm active:scale-95 transition-all relative overflow-hidden";
                    card.onclick = () => this.startSession(list.slice(i*size, (i+1)*size), i+1, key);
                    let check = score > 0 ? `<div class="absolute top-4 right-4 bg-emerald-500 text-white p-1 rounded-full"><i data-lucide="check" class="w-3 h-3"></i></div>` : '';
                    card.innerHTML = `${check}<div class="w-9 h-9 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400 font-black text-xs mb-4">${i+1}</div><h3 class="font-black text-slate-800 text-lg leading-tight">Day ${i+1}</h3><p class="text-[9px] font-black text-indigo-500 mt-1 uppercase">${score>0?score+'pts':'Start'}</p>`;
                    grid.appendChild(card);
                }
                const pct = days > 0 ? Math.round((completed/days)*100) : 0;
                document.getElementById('totalProgressText').textContent = `${pct}% Complete`;
                document.getElementById('progressFill').style.transform = `scaleY(${pct/100})`;
                this.ri();
            },

            // 🔈 발음 (TTS)
            unlockAudio() {
                if (this.audioUnlocked) return;
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
                this.audioUnlocked = true;
            },
            speak(txt) {
                if(!txt || !('speechSynthesis' in window)) return;
                window.speechSynthesis.cancel();
                const ut = new SpeechSynthesisUtterance(txt);
                if(this.ttsVoice) ut.voice = this.ttsVoice;
                ut.lang = 'en-US'; ut.rate = 0.85;
                window.speechSynthesis.speak(ut);
            },

            // 📖 제스처 & 세션
            ts(e) { this.tx = e.changedTouches[0].screenX; this.ty = e.changedTouches[0].screenY; },
            te(e) {
                const dx = e.changedTouches[0].screenX - this.tx;
                const dy = e.changedTouches[0].screenY - this.ty;
                if(Math.abs(dx) < 55 || Math.abs(dy) > 100 || this.mode !== 'study') return;
                if(dx > 0) this.moveLeft(); else this.moveRight();
            },
            moveLeft() {
                if(this.sessionIdx > 0) {
                    const wrap = document.getElementById('cardWrapper');
                    wrap.classList.add('slide-out-right');
                    setTimeout(() => { this.sessionIdx--; this.renderStudy(); wrap.className = 'w-full slide-in'; }, 200);
                }
            },
            moveRight() {
                if(this.sessionIdx < this.sessionWords.length - 1) {
                    const wrap = document.getElementById('cardWrapper');
                    wrap.classList.add('slide-out-left');
                    setTimeout(() => { this.sessionIdx++; this.renderStudy(); wrap.className = 'w-full slide-in'; }, 200);
                } else { this.switchMode('quiz'); }
            },

            startSession(words, dayNum, key) {
                this.sessionWords = words; this.sessionIdx = 0; this.mode = 'study'; this.currentKey = key;
                document.getElementById('sessionLayer').classList.remove('hidden');
                document.getElementById('sessionDayLabel').textContent = `Day ${dayNum}`;
                document.getElementById('sessionTotal').textContent = words.length;
                this.renderStudy();
            },
            renderStudy() {
                const w = this.sessionWords[this.sessionIdx];
                document.getElementById('flashcard').classList.remove('flipped');
                document.getElementById('sessionIdx').textContent = this.sessionIdx+1;
                document.getElementById('lWord').textContent = w.word;
                document.getElementById('lPron').textContent = w.pronunciation;
                document.getElementById('lMeaning').textContent = w.meaning;
                document.getElementById('lStory').textContent = w.story;
                document.getElementById('lExEn').textContent = w.example.en;
                document.getElementById('lExKo').textContent = w.example.ko;
                document.getElementById('lEtym').innerHTML = w.parts.map(p=>`<div class="p-2 bg-white rounded-xl border border-slate-100 flex-1 min-w-[70px] text-center shadow-sm"><div class="text-[7px] font-black opacity-30 uppercase">${p.type}</div><div class="text-[12px] font-black text-indigo-700">${p.text}</div><div class="text-[8px] font-bold text-slate-500 mt-0.5">${p.meaning}</div></div>`).join('');
                document.getElementById('nextBtn').textContent = this.sessionIdx === this.sessionWords.length - 1 ? "Start Quiz" : "Next";
                this.ri();
            },

            switchMode(m) {
                this.mode = m;
                ['studyUI','quizUI','resultUI'].forEach(ui => document.getElementById(ui).classList.add('hidden'));
                document.getElementById(`${m}UI`).classList.remove('hidden');
                document.getElementById('mode-study').className = m==='study'?"px-4 py-1 text-[10px] font-black rounded-md bg-white shadow-sm text-indigo-600":"px-4 py-1 text-[10px] font-black rounded-md text-slate-400";
                document.getElementById('mode-quiz').className = m==='quiz'?"px-4 py-1 text-[10px] font-black rounded-md bg-white shadow-sm text-rose-600":"px-4 py-1 text-[10px] font-black rounded-md text-slate-400";
                if(m==='quiz') { this.sessionIdx = 0; this.score = 0; this.wrongs = []; this.sessionWords = [...this.sessionWords].sort(()=>Math.random()-0.5); this.loadQuizQ(); }
                else if(m==='study') { this.sessionIdx = 0; this.renderStudy(); }
                this.ri();
            },
            loadQuizQ() {
                if(this.sessionIdx >= this.sessionWords.length) return this.showResult();
                this.isAns = false; const w = this.sessionWords[this.sessionIdx];
                document.getElementById('sessionIdx').textContent = this.sessionIdx+1;
                document.getElementById('qWord').textContent = w.word;
                document.getElementById('qPron').textContent = w.pronunciation;
                document.getElementById('qBar').style.width = `${(this.sessionIdx/this.sessionWords.length)*100}%`;
                let opts = [{t:w.meaning, c:true}].concat(this.db.filter(i=>i.word!==w.word).sort(()=>Math.random()-0.5).slice(0,3).map(i=>({t:i.meaning,c:false}))).sort(()=>Math.random()-0.5);
                const container = document.getElementById('qOptions'); container.innerHTML = '';
                opts.forEach((o, i) => {
                    const btn = document.createElement('button');
                    btn.className = "option-btn w-full text-left p-5 rounded-[1.5rem] border-2 border-slate-200 bg-white font-black text-slate-700 flex items-center shadow-sm";
                    btn.innerHTML = `<span class="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center mr-4 text-xs font-black text-slate-300">${i+1}</span> ${o.t}`;
                    btn.onclick = () => this.checkQuiz(btn, o.c, w);
                    container.appendChild(btn);
                });
            },
            checkQuiz(el, correct, w) {
                if(this.isAns) return; this.isAns = true;
                if(correct) {
                    el.className = "option-btn w-full text-left p-5 rounded-[1.5rem] border-2 border-emerald-500 bg-emerald-50 font-black text-emerald-700 shadow-lg scale-[1.02] flex items-center";
                    this.score += Math.round(100/this.sessionWords.length);
                } else {
                    el.className = "option-btn w-full text-left p-5 rounded-[1.5rem] border-2 border-rose-500 bg-rose-50 font-black text-rose-700 flex items-center";
                    this.wrongs.push(w);
                    document.querySelectorAll('.option-btn').forEach(b => { if(b.textContent.includes(w.meaning)) b.classList.add('border-emerald-500','bg-emerald-50'); });
                }
                setTimeout(()=>{ this.sessionIdx++; this.loadQuizQ(); }, 1000);
            },
            showResult() {
                this.mode = 'result';
                ['studyUI','quizUI','resultUI'].forEach(ui => document.getElementById(ui).classList.add('hidden'));
                document.getElementById('resultUI').classList.remove('hidden');
                const cur = this.wrongs.length===0?100:this.score;
                document.getElementById('fScore').textContent = cur;
                if(!this.history[this.currentKey] || cur > this.history[this.currentKey]) {
                    this.history[this.currentKey] = cur;
                    localStorage.setItem('vocaroot_h_vFinal', JSON.stringify(this.history));
                }
                const list = document.getElementById('wrongList'); list.innerHTML = '';
                if(this.wrongs.length > 0) {
                    document.getElementById('wrongReview').classList.remove('hidden');
                    this.wrongs.forEach(w => { list.innerHTML += `<li class="bg-white p-3 rounded-xl border border-rose-100 flex flex-col"><span class="font-black text-slate-800 text-sm">${w.word}</span><span class="text-rose-500 text-[10px] font-bold">${w.meaning}</span></li>`; });
                } else document.getElementById('wrongReview').classList.add('hidden');
                this.ri();
            },

            confirmExit() { document.getElementById('exitModal').classList.remove('hidden'); },
            exitNow() { document.getElementById('exitModal').classList.add('hidden'); document.getElementById('sessionLayer').classList.add('hidden'); this.renderGrid(); },
            toggleDict() {
                const p = document.getElementById('dictPanel'); const o = document.getElementById('dictOverlay');
                const isOpen = p.classList.toggle('open'); o.classList.toggle('hidden', !isOpen);
                setTimeout(()=>o.style.opacity = isOpen ? '1' : '0', 10);
            },
            searchDict() {
                const q = document.getElementById('dictInput').value.toLowerCase();
                const list = document.getElementById('dictList'); list.innerHTML = '';
                this.db.filter(i=>(i.word+i.meaning).toLowerCase().includes(q)).slice(0,20).forEach(w => {
                    const c = document.createElement('div');
                    c.className = "bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center shadow-sm active:bg-slate-50";
                    c.onclick = () => this.speak(w.word);
                    c.innerHTML = `<div><span class="font-black text-slate-800 text-sm">${w.word}</span><p class="text-[11px] font-bold text-indigo-600 mt-1">${w.meaning}</p></div><i data-lucide="volume-2" class="w-4 h-4 text-slate-300"></i>`;
                    list.appendChild(c);
                });
                this.ri();
            },
            ri() { if(window.lucide) window.lucide.createIcons(); }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
