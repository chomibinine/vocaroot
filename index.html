<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VocaRoots Pro - Hint & Score Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; background-color: #f8fafc; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* 스와이프 래퍼 */
        #cardWrapper { position: relative; width: 100%; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s; }
        
        /* 플래시카드 뒤집기 애니메이션 */
        .flip-card { perspective: 1000px; width: 100%; height: calc(100vh - 280px); min-height: 480px; max-height: 600px; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        
        .flip-card-front, .flip-card-back { 
            position: absolute; width: 100%; height: 100%; 
            -webkit-backface-visibility: hidden; backface-visibility: hidden; 
            border-radius: 2.5rem; display: flex; flex-direction: column; 
            box-shadow: 0 20px 40px -15px rgb(0 0 0 / 0.1); border: 1px solid #e2e8f0; 
            background: white; overflow: hidden;
        }
        
        .flip-card-front { align-items: center; justify-content: center; padding: 2rem; }
        .flip-card-back { transform: rotateY(180deg); align-items: stretch; justify-content: flex-start; padding: 1.5rem; overflow-y: auto; }

        /* 스와이프 슬라이드 효과 */
        .slide-out-left { transform: translateX(-130%) rotate(-10deg) !important; opacity: 0; transition: transform 0.3s ease-in, opacity 0.3s ease-in; }
        .slide-out-right { transform: translateX(130%) rotate(10deg) !important; opacity: 0; transition: transform 0.3s ease-in, opacity 0.3s ease-in; }
        .slide-in { animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards; }
        @keyframes slideIn { from { transform: scale(0.9) translateY(40px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

        #dictPanel { transform: translateX(100%); transition: transform 0.3s ease; }
        #dictPanel.open { transform: translateX(0); }
        .btn-active:active { transform: scale(0.92); opacity: 0.8; }
        
        .option-btn:active { transform: scale(0.96); background: #f8fafc; }
        
        /* 힌트 콘텐츠 스크롤바 최적화 */
        #qHintContent { max-height: 160px; overflow-y: auto; }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col overflow-hidden select-none" onclick="app.unlockAudio()">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 z-40 shrink-0 px-4 py-3 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-xl shadow-md"><i data-lucide="graduation-cap" class="text-white w-5 h-5"></i></div>
                <h1 class="text-lg font-black text-slate-900 tracking-tight">Voca<span class="text-indigo-600">Roots</span></h1>
            </div>
            <div class="flex items-center gap-2">
                <div id="loadStatus" class="flex items-center gap-1.5 bg-slate-50 px-2.5 py-1.5 rounded-full border border-slate-200">
                    <div class="w-2 h-2 bg-slate-300 rounded-full" id="statusDot"></div>
                    <span id="statusText" class="text-[9px] font-black text-slate-400 uppercase">Search</span>
                </div>
                <button onclick="app.toggleDict()" class="p-2.5 rounded-xl bg-slate-50 text-slate-400 active:text-indigo-600 btn-active"><i data-lucide="search" class="w-5 h-5"></i></button>
            </div>
        </div>
    </header>

    <!-- 대시보드 메인 -->
    <main id="mainDashboard" class="flex-1 overflow-y-auto p-4 pb-24">
        <div class="max-w-4xl mx-auto">
            <div class="mb-6 flex items-center justify-between bg-white p-5 rounded-[2rem] border border-slate-200 shadow-sm">
                <div>
                    <h2 id="totalProgressText" class="text-2xl font-black text-slate-900 leading-none">0% Done</h2>
                    <span id="wordCountLabel" class="text-[11px] font-bold text-indigo-500 uppercase tracking-widest mt-1.5 block">No Words Active</span>
                </div>
                <button onclick="app.resetHistory()" class="p-2 text-slate-300 active:text-rose-500 transition-colors"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
            </div>

            <!-- 정렬/필터 옵션 3열 그리드 -->
            <div class="grid grid-cols-3 gap-2 mb-6">
                <div class="bg-white p-2.5 rounded-2xl border border-slate-200 shadow-sm">
                    <p class="text-[8px] font-black text-slate-400 uppercase mb-1 text-center tracking-widest">Level</p>
                    <select id="courseLevel" onchange="app.renderGrid()" class="w-full bg-transparent font-black text-[13px] outline-none text-center">
                        <option value="all">전체</option>
                        <option value="middle">중학</option>
                        <option value="high">고등</option>
                    </select>
                </div>
                <div class="bg-white p-2.5 rounded-2xl border border-slate-200 shadow-sm">
                    <p class="text-[8px] font-black text-slate-400 uppercase mb-1 text-center tracking-widest">Amount</p>
                    <select id="dailyAmount" onchange="app.renderGrid()" class="w-full bg-transparent font-black text-[13px] outline-none text-center">
                        <option value="10">10개씩</option>
                        <option value="20" selected>20개씩</option>
                        <option value="30">30개씩</option>
                    </select>
                </div>
                <div class="bg-white p-2.5 rounded-2xl border border-slate-200 shadow-sm">
                    <p class="text-[8px] font-black text-slate-400 uppercase mb-1 text-center tracking-widest">Sort</p>
                    <select id="sortOrder" onchange="app.renderGrid()" class="w-full bg-transparent font-black text-[13px] outline-none text-center text-indigo-600">
                        <option value="root">기본</option>
                        <option value="alpha">A-Z순</option>
                        <option value="level">중요도</option>
                    </select>
                </div>
            </div>

            <!-- 데이 리스트 -->
            <div id="daysGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4"></div>
            
            <div id="emptyMsg" class="py-24 text-center text-slate-300 font-bold hidden"><i data-lucide="inbox" class="w-12 h-12 mx-auto mb-3 opacity-20"></i>DATA를 불러와주세요.</div>
            <input type="file" id="fileLoader" multiple accept=".json" class="hidden" onchange="app.importData(event)">
            <div id="manualLoadBtn" class="text-center mt-6 hidden">
                <button onclick="document.getElementById('fileLoader').click()" class="bg-slate-900 text-white px-6 py-3 rounded-xl text-xs font-black shadow-lg">수동 데이터 로드</button>
            </div>
        </div>
    </main>

    <!-- 세션 화면 (학습 & 퀴즈) -->
    <div id="sessionLayer" class="fixed inset-0 z-[100] bg-white hidden flex flex-col overflow-hidden">
        <div class="bg-white border-b border-slate-100 px-5 py-4 flex justify-between items-center shrink-0">
            <button onclick="app.confirmExit()" class="text-slate-400 p-2 btn-active"><i data-lucide="home" class="w-7 h-7 text-slate-300"></i></button>
            <div class="text-center">
                <span id="sessionDayLabel" class="text-[10px] font-black text-indigo-400 uppercase tracking-widest">DAY 01</span>
                <div class="flex bg-slate-100 p-0.5 rounded-lg mt-0.5">
                    <button id="mode-study" onclick="app.switchMode('study')" class="px-4 py-1 text-[10px] font-black rounded-md bg-white shadow-sm text-indigo-600 transition-all">STUDY</button>
                    <button id="mode-quiz" onclick="app.switchMode('quiz')" class="px-4 py-1 text-[10px] font-black rounded-md text-slate-400 transition-all">QUIZ</button>
                </div>
            </div>
            <div class="text-[11px] font-black min-w-[55px] text-right"><span id="sessionIdx" class="text-indigo-600 text-lg">1</span><span class="text-slate-200 mx-0.5">/</span><span id="sessionTotal" class="text-slate-400">20</span></div>
        </div>

        <div id="sessionContent" class="flex-1 bg-slate-50 flex flex-col p-4 relative overflow-hidden" ontouchstart="app.ts(event)" ontouchend="app.te(event)">
            
            <!-- STEP 1: STUDY (학습/플래시카드) -->
            <div id="studyUI" class="flex-1 flex flex-col items-center justify-center w-full max-w-md mx-auto">
                <div id="cardWrapper" class="w-full slide-in">
                    <div class="flip-card cursor-pointer" id="flashcard" onclick="this.classList.toggle('flipped')">
                        <div class="flip-card-inner">
                            <!-- 앞면 -->
                            <div class="flip-card-front">
                                <span class="text-indigo-300 text-[11px] font-black uppercase tracking-[0.4em] mb-4">Tap to Flip</span>
                                <h2 id="lWord" class="text-6xl font-black text-slate-900 tracking-tighter mb-2"></h2>
                                <p id="lPron" class="text-slate-300 text-xl font-medium italic mb-10"></p>
                                
                                <button onclick="event.stopPropagation(); app.speak(document.getElementById('lWord').textContent)" 
                                        class="p-8 bg-indigo-600 text-white rounded-full active:scale-90 shadow-2xl shadow-indigo-100 btn-active">
                                    <i data-lucide="volume-2" class="w-12 h-12"></i>
                                </button>
                                
                                <div class="absolute bottom-8 flex items-center gap-2 text-[10px] font-black text-slate-200 uppercase tracking-widest">
                                    <i data-lucide="arrow-left-right" class="w-4 h-4"></i> Swipe to Move
                                </div>
                            </div>
                            
                            <!-- 뒷면 -->
                            <div class="flip-card-back custom-scroll space-y-5">
                                <div class="text-center shrink-0">
                                    <span class="bg-indigo-600 text-white px-8 py-3 rounded-[1.5rem] text-2xl font-black inline-block shadow-lg shadow-indigo-100" id="lMeaning"></span>
                                </div>
                                
                                <!-- 상하 배치된 어원 분석 -->
                                <div>
                                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 flex items-center gap-1.5"><i data-lucide="layers" class="w-3.5 h-3.5"></i> Etymology Analysis</p>
                                    <div id="lEtym" class="flex flex-col gap-2"></div>
                                </div>

                                <div>
                                    <div class="bg-amber-50 p-4 rounded-2xl border border-amber-100 shadow-sm">
                                        <p class="text-amber-800 font-black text-[10px] uppercase mb-1.5 flex items-center gap-1.5"><i data-lucide="sparkles" class="w-3.5 h-3.5"></i> Story Memory</p>
                                        <p id="lStory" class="text-amber-900 text-[15px] font-bold leading-relaxed"></p>
                                    </div>
                                </div>

                                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 relative shadow-sm shrink-0">
                                    <div class="flex justify-between items-center mb-1">
                                        <p class="text-slate-400 font-black text-[10px] uppercase">Example Sentence</p>
                                        <button onclick="event.stopPropagation(); app.speak(document.getElementById('lExEn').textContent)" class="p-1 bg-white rounded-lg text-indigo-500 shadow-sm active:scale-110"><i data-lucide="volume-1" class="w-5 h-5"></i></button>
                                    </div>
                                    <p id="lExEn" class="text-slate-800 font-black italic text-[16px] leading-snug mb-1"></p>
                                    <p id="lExKo" class="text-slate-500 text-[13px] font-bold"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="mt-8 flex gap-4 w-full">
                    <button onclick="app.navCard(-1)" class="h-16 w-16 bg-white border border-slate-200 rounded-3xl flex items-center justify-center text-slate-400 btn-active shadow-sm"><i data-lucide="chevron-left" class="w-10 h-10"></i></button>
                    <button id="nextBtn" onclick="app.navCard(1)" class="flex-1 h-16 bg-slate-900 text-white rounded-3xl font-black shadow-xl active:bg-black transition-all">NEXT WORD</button>
                </div>
            </div>

            <!-- STEP 2: Quiz UI (스크롤 최적화 및 힌트 기능) -->
            <div id="quizUI" class="hidden flex-1 flex flex-col items-center justify-start w-full max-w-md mx-auto overflow-y-auto custom-scroll pb-6">
                <!-- 상하 패딩을 줄여 공간 확보 -->
                <div class="w-full bg-white rounded-3xl shadow-xl p-6 mb-4 mt-2 border border-slate-200 relative overflow-hidden text-center flex flex-col shrink-0">
                    <div class="absolute top-0 left-0 w-full h-1 bg-slate-50"><div id="qBar" class="h-full bg-indigo-600 transition-all duration-300"></div></div>
                    
                    <div class="flex items-center justify-center gap-3 mb-1 mt-2">
                        <h3 id="qWord" class="text-4xl font-black text-slate-900 tracking-tighter"></h3>
                        <button onclick="app.speak(document.getElementById('qWord').textContent)" class="p-2 bg-slate-50 text-indigo-400 rounded-full active:bg-indigo-100"><i data-lucide="volume-2" class="w-5 h-5"></i></button>
                    </div>
                    <p id="qPron" class="text-slate-300 text-sm italic font-medium mb-4"></p>
                    
                    <!-- 💡 힌트 버튼 -->
                    <button onclick="app.showHint()" id="hintBtn" class="mx-auto flex items-center gap-1.5 text-[11px] font-black text-amber-500 bg-amber-50 px-4 py-2 rounded-full active:scale-95 transition-transform border border-amber-100">
                        <i data-lucide="lightbulb" class="w-4 h-4"></i> 힌트 (어원) 보기
                    </button>
                    
                    <!-- 힌트 내용 (숨김 처리) -->
                    <div id="qHintContent" class="hidden mt-3 text-left border-t border-slate-100 pt-3 custom-scroll">
                        <div id="qEtym" class="flex flex-col gap-1.5"></div>
                    </div>
                </div>
                
                <!-- 4지선다 옵션 (간격 및 패딩 축소) -->
                <div id="qOptions" class="w-full flex flex-col gap-2 shrink-0"></div>
            </div>

            <!-- STEP 3: Result UI (정답 수 표기) -->
            <div id="resultUI" class="hidden flex-1 flex flex-col items-center justify-center text-center p-6 bg-white rounded-[3rem] shadow-sm">
                <div class="w-24 h-24 bg-yellow-100 rounded-full flex items-center justify-center mb-6 shadow-inner"><i data-lucide="award" class="text-yellow-500 w-12 h-12"></i></div>
                <h2 class="text-4xl font-black text-slate-900 mb-1">Session Cleared!</h2>
                
                <!-- 점수 대신 맞춘 개수 표시 -->
                <p class="text-slate-500 font-bold mb-8 text-sm uppercase tracking-widest mt-2">Score</p>
                <div class="flex items-baseline justify-center mb-8 gap-1">
                    <span id="fCorrect" class="text-indigo-600 text-6xl font-black leading-none">0</span>
                    <span class="text-slate-300 text-3xl font-black leading-none">/</span>
                    <span id="fTotal" class="text-slate-300 text-3xl font-black leading-none">20</span>
                </div>

                <div id="wrongReview" class="w-full max-w-xs bg-rose-50 rounded-2xl p-6 border border-rose-100 mb-8 hidden overflow-y-auto max-h-48 text-left">
                    <p class="text-rose-700 font-black text-[10px] mb-3 uppercase flex items-center gap-1"><i data-lucide="alert-circle" class="w-4 h-4"></i> Wrong Word Review</p>
                    <ul id="wrongList" class="space-y-2"></ul>
                </div>
                <button onclick="app.exitNow()" class="w-full max-w-xs h-16 bg-slate-900 text-white rounded-3xl font-black shadow-xl uppercase">Back to Home</button>
            </div>
        </div>
    </div>

    <!-- 사전 패널 -->
    <aside id="dictPanel" class="fixed top-0 right-0 h-full w-full max-w-xs bg-white shadow-2xl z-[60] flex flex-col border-l border-slate-200">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
            <h3 class="font-black text-indigo-600 flex items-center gap-2"><i data-lucide="search" class="w-5 h-5"></i> Dictionary</h3>
            <button onclick="app.toggleDict()" class="p-2"><i data-lucide="x"></i></button>
        </div>
        <div class="p-4 border-b border-slate-100"><input type="text" id="dictInput" oninput="app.searchDict()" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-sm shadow-inner" placeholder="검색..."></div>
        <div id="dictList" class="flex-1 overflow-y-auto custom-scroll p-4 space-y-2"></div>
    </aside>

    <!-- 중단 모달 -->
    <div id="exitModal" class="fixed inset-0 z-[200] bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-6">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-xs text-center shadow-2xl">
            <h4 class="text-xl font-black text-slate-900 mb-2">Stop Session?</h4>
            <p class="text-sm text-slate-400 font-medium mb-8">진행 내용이 저장되지 않습니다.</p>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="document.getElementById('exitModal').classList.add('hidden')" class="py-4 bg-slate-100 rounded-2xl font-black text-slate-500 text-sm">Resume</button>
                <button onclick="app.exitNow()" class="py-4 bg-rose-500 rounded-2xl font-black text-white text-sm">Exit</button>
            </div>
        </div>
    </div>

    <script>
        const app = {
            db: [], history: {}, sessionWords: [], sessionIdx: 0,
            score: 0, wrongs: [], isAns: false, mode: 'study', currentKey: '',
            audioUnlocked: false, ttsVoice: null, tx: 0, ty: 0,

            async init() {
                this.loadHistory();
                await this.autoFetchData();
                this.renderGrid();
                this.ri();
                if('speechSynthesis' in window) {
                    const setup = () => {
                        this.ttsVoice = window.speechSynthesis.getVoices().find(v => v.lang.startsWith('en')) || null;
                    };
                    window.speechSynthesis.onvoiceschanged = setup; setup();
                }
            },

            // 🤖 자동 로딩 (GitHub 경로 대응)
            async autoFetchData() {
                const dot = document.getElementById('statusDot');
                const text = document.getElementById('statusText');
                this.db = [];
                let success = false;

                for(let i=1; i<=20; i++) {
                    try {
                        const res = await fetch(`./data_part${i}.json`);
                        if(res.ok) {
                            const json = await res.json();
                            this.db.push(...(Array.isArray(json) ? json : (json.words || [])));
                            success = true;
                        }
                    } catch(e) {}
                }

                if(success) {
                    this.db = this.db.filter((v,i,a)=>a.findIndex(t=>t.word===v.word)===i);
                    dot.className = "w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse";
                    text.textContent = "Data Linked";
                    text.className = "text-[10px] font-black text-emerald-600 uppercase";
                    document.getElementById('wordCountLabel').textContent = `${this.db.length.toLocaleString()} Words Active`;
                } else {
                    text.textContent = "No Data Found";
                    document.getElementById('emptyMsg').classList.remove('hidden');
                    document.getElementById('manualLoadBtn').classList.remove('hidden');
                }
            },

            // 💾 히스토리: 문자열("맞춘수/전체수") 포맷으로 저장
            loadHistory() {
                const h = localStorage.getItem('v_h_vScoreHint'); if(h) this.history = JSON.parse(h);
                const m = localStorage.getItem('v_manual_db'); if(m) this.db = JSON.parse(m);
            },

            async importData(e) {
                const files = e.target.files;
                for(let f of files) {
                    try {
                        const txt = await f.text();
                        const json = JSON.parse(txt);
                        this.db.push(...(Array.isArray(json) ? json : (json.words || [])));
                    } catch(err) {}
                }
                this.db = this.db.filter((v,i,a)=>a.findIndex(t=>t.word===v.word)===i);
                localStorage.setItem('v_manual_db', JSON.stringify(this.db));
                location.reload();
            },

            resetHistory() { if(confirm("학습 이력을 모두 지우시겠습니까?")) { localStorage.removeItem('v_h_vScoreHint'); location.reload(); } },

            // 📊 그리드 렌더링 (맞춘 개수 분수 표시 반영)
            renderGrid() {
                const grid = document.getElementById('daysGrid'); grid.innerHTML = '';
                const lvl = document.getElementById('courseLevel').value;
                const size = parseInt(document.getElementById('dailyAmount').value);
                const sort = document.getElementById('sortOrder').value;

                let list = lvl==='all' ? [...this.db] : this.db.filter(w=>w.level===lvl);
                if(sort === 'alpha') list.sort((a,b) => a.word.localeCompare(b.word));
                else if(sort === 'level') list.sort((a,b) => a.level.localeCompare(b.level));
                
                if(!list.length) return;

                const days = Math.ceil(list.length/size);
                let completed = 0;
                for(let i=0; i<days; i++){
                    const key = `${lvl}_${size}_${sort}_${i+1}`;
                    const scoreStr = this.history[key]; // "18/20" 형태
                    
                    if(scoreStr) completed++;
                    
                    const card = document.createElement('div');
                    card.className = "bg-white p-5 rounded-[2rem] border border-slate-200 shadow-sm active:scale-95 transition-all relative overflow-hidden";
                    card.onclick = () => this.startSession(list.slice(i*size, (i+1)*size), i+1, key);
                    
                    let check = scoreStr ? `<div class="absolute top-4 right-4 bg-emerald-500 text-white p-1 rounded-full"><i data-lucide="check" class="w-3.5 h-3.5"></i></div>` : '';
                    let scoreText = scoreStr ? `<p class="text-[12px] font-black text-indigo-600 mt-1 uppercase tracking-tighter">${scoreStr}</p>` : `<p class="text-[10px] font-black text-slate-300 mt-1 uppercase">Start</p>`;
                    
                    card.innerHTML = `${check}<div class="w-9 h-9 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400 font-black text-xs mb-4">${i+1}</div><h3 class="font-black text-slate-800 text-lg leading-tight">Day ${i+1}</h3>${scoreText}`;
                    grid.appendChild(card);
                }
                const pct = days > 0 ? Math.round((completed/days)*100) : 0;
                document.getElementById('totalProgressText').textContent = `${pct}% Done`;
                document.getElementById('progressFill').style.transform = `scaleY(${pct/100})`;
                this.ri();
            },

            // 🔈 TTS
            unlockAudio() { if(!this.audioUnlocked) { window.speechSynthesis.speak(new SpeechSynthesisUtterance("")); this.audioUnlocked = true; } },
            speak(txt) {
                if(!txt || !('speechSynthesis' in window)) return;
                window.speechSynthesis.cancel();
                const ut = new SpeechSynthesisUtterance(txt);
                if(this.ttsVoice) ut.voice = this.ttsVoice;
                ut.lang = 'en-US'; ut.rate = 0.85; window.speechSynthesis.speak(ut);
            },

            // 📖 제스처 & 스와이프
            ts(e) { this.tx = e.changedTouches[0].screenX; this.ty = e.changedTouches[0].screenY; },
            te(e) {
                const dx = e.changedTouches[0].screenX - this.tx;
                const dy = e.changedTouches[0].screenY - this.ty;
                if(Math.abs(dx) < 55 || Math.abs(dy) > 100 || this.mode !== 'study') return;
                if(dx > 0) this.moveLeft(); else this.moveRight();
            },
            moveLeft() {
                if(this.sessionIdx > 0) {
                    const wrap = document.getElementById('cardWrapper');
                    wrap.classList.remove('slide-in'); wrap.classList.add('slide-out-right');
                    setTimeout(() => { this.sessionIdx--; this.renderStudy(); wrap.classList.remove('slide-out-right'); wrap.classList.add('slide-in'); }, 250);
                }
            },
            moveRight() {
                if(this.sessionIdx < this.sessionWords.length - 1) {
                    const wrap = document.getElementById('cardWrapper');
                    wrap.classList.remove('slide-in'); wrap.classList.add('slide-out-left');
                    setTimeout(() => { this.sessionIdx++; this.renderStudy(); wrap.classList.remove('slide-out-left'); wrap.classList.add('slide-in'); }, 250);
                } else { this.switchMode('quiz'); }
            },
            navCard(dir) { if(dir === -1) this.moveLeft(); else this.moveRight(); },

            // 📖 학습 모드
            startSession(words, dayNum, key) {
                this.sessionWords = words; this.sessionIdx = 0; this.mode = 'study'; this.currentKey = key;
                document.getElementById('sessionLayer').classList.remove('hidden');
                document.getElementById('sessionDayLabel').textContent = `Day ${dayNum}`;
                document.getElementById('sessionTotal').textContent = words.length;
                this.renderStudy();
            },
            renderStudy() {
                const w = this.sessionWords[this.sessionIdx];
                const card = document.getElementById('flashcard');
                const inner = document.querySelector('.flip-card-inner');
                
                // 애니메이션 없이 무조건 앞면 고정 (리플로우)
                inner.style.transition = 'none'; card.classList.remove('flipped'); void inner.offsetWidth; inner.style.transition = '';

                document.getElementById('sessionIdx').textContent = this.sessionIdx+1;
                document.getElementById('lWord').textContent = w.word;
                document.getElementById('lPron').textContent = w.pronunciation;
                document.getElementById('lMeaning').textContent = w.meaning;
                document.getElementById('lStory').textContent = w.story;
                document.getElementById('lExEn').textContent = w.example.en;
                document.getElementById('lExKo').textContent = w.example.ko;
                
                // 학습화면 어원 렌더링 (상하배치, 글자 확대)
                document.getElementById('lEtym').innerHTML = w.parts.map(p=>`
                    <div class="p-3 bg-indigo-50/50 rounded-2xl border border-indigo-100 shadow-sm flex flex-col w-full text-left">
                        <div class="flex justify-between items-center mb-1.5 w-full">
                            <span class="text-[18px] font-black text-indigo-700 leading-none">${p.text}</span>
                            <span class="text-[9px] font-black text-slate-400 uppercase bg-white px-2 py-1 rounded-md shadow-sm border border-slate-100">${p.type}</span>
                        </div>
                        <p class="text-[13px] font-bold text-slate-700 leading-snug text-left">${p.meaning}</p>
                    </div>
                `).join('');
                
                document.getElementById('nextBtn').textContent = this.sessionIdx === this.sessionWords.length - 1 ? "Start Quiz" : "Next Word";
                this.ri();
            },

            switchMode(m) {
                this.mode = m;
                ['studyUI','quizUI','resultUI'].forEach(ui => document.getElementById(ui).classList.add('hidden'));
                document.getElementById(`${m}UI`).classList.remove('hidden');
                document.getElementById('mode-study').className = m==='study'?"px-4 py-1 text-[10px] font-black rounded-md bg-white shadow-sm text-indigo-600":"px-4 py-1 text-[10px] font-black rounded-md text-slate-400";
                document.getElementById('mode-quiz').className = m==='quiz'?"px-4 py-1 text-[10px] font-black rounded-md bg-white shadow-sm text-rose-600":"px-4 py-1 text-[10px] font-black rounded-md text-slate-400";
                if(m==='quiz') { this.sessionIdx = 0; this.score = 0; this.wrongs = []; this.sessionWords = [...this.sessionWords].sort(()=>Math.random()-0.5); this.loadQuizQ(); }
                else if(m==='study') { this.sessionIdx = 0; this.renderStudy(); }
                this.ri();
            },

            // 💡 퀴즈 모드 및 힌트 기능
            loadQuizQ() {
                if(this.sessionIdx >= this.sessionWords.length) return this.showResult();
                this.isAns = false; const w = this.sessionWords[this.sessionIdx];
                document.getElementById('sessionIdx').textContent = this.sessionIdx+1;
                document.getElementById('qWord').textContent = w.word;
                document.getElementById('qPron').textContent = w.pronunciation;
                document.getElementById('qBar').style.width = `${(this.sessionIdx/this.sessionWords.length)*100}%`;
                
                // 힌트 초기화
                document.getElementById('hintBtn').classList.remove('hidden');
                document.getElementById('qHintContent').classList.add('hidden');
                document.getElementById('qEtym').innerHTML = w.parts.map(p=>`
                    <div class="p-2.5 bg-indigo-50/50 rounded-xl border border-indigo-100 flex flex-col w-full text-left">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[14px] font-black text-indigo-700 leading-none">${p.text}</span>
                            <span class="text-[8px] font-black text-slate-400 uppercase bg-white px-1.5 py-0.5 rounded-md border border-slate-100">${p.type}</span>
                        </div>
                        <p class="text-[11px] font-bold text-slate-700 leading-snug">${p.meaning}</p>
                    </div>
                `).join('');

                let opts = [{t:w.meaning, c:true}].concat(this.db.filter(i=>i.word!==w.word).sort(()=>Math.random()-0.5).slice(0,3).map(i=>({t:i.meaning,c:false}))).sort(()=>Math.random()-0.5);
                const container = document.getElementById('qOptions'); container.innerHTML = '';
                opts.forEach((o, i) => {
                    const btn = document.createElement('button');
                    btn.className = "option-btn w-full text-left p-4 rounded-2xl border-2 border-slate-200 bg-white font-black text-slate-700 flex items-center transition-all shadow-sm shrink-0";
                    btn.innerHTML = `<span class="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center mr-3 text-xs font-black text-slate-400 shrink-0">${i+1}</span> <span class="leading-snug">${o.t}</span>`;
                    btn.onclick = () => this.checkQuiz(btn, o.c, w);
                    container.appendChild(btn);
                });
                
                // 스크롤 맨 위로 초기화
                document.getElementById('quizUI').scrollTop = 0;
                this.ri();
            },
            showHint() {
                document.getElementById('hintBtn').classList.add('hidden');
                document.getElementById('qHintContent').classList.remove('hidden');
            },
            checkQuiz(el, correct, w) {
                if(this.isAns) return; this.isAns = true;
                if(correct) {
                    el.className = "option-btn w-full text-left p-4 rounded-2xl border-2 border-emerald-500 bg-emerald-50 font-black text-emerald-700 shadow-lg scale-[1.02] flex items-center shrink-0";
                    this.score++; // 정답 개수 1 증가
                } else {
                    el.className = "option-btn w-full text-left p-4 rounded-2xl border-2 border-rose-500 bg-rose-50 font-black text-rose-700 flex items-center shrink-0";
                    this.wrongs.push(w);
                    document.querySelectorAll('.option-btn').forEach(b => { if(b.textContent.includes(w.meaning)) b.classList.add('border-emerald-500','bg-emerald-50'); });
                }
                setTimeout(()=>{ this.sessionIdx++; this.loadQuizQ(); }, 1200);
            },

            // 🏆 결과 처리 (분수 포맷 저장)
            showResult() {
                this.mode = 'result';
                ['studyUI','quizUI','resultUI'].forEach(ui => document.getElementById(ui).classList.add('hidden'));
                document.getElementById('resultUI').classList.remove('hidden');
                
                const total = this.sessionWords.length;
                const correct = this.score; // 실제 맞춘 개수
                
                document.getElementById('fCorrect').textContent = correct;
                document.getElementById('fTotal').textContent = total;
                
                // "18/20" 형태의 문자열로 저장
                const scoreStr = `${correct}/${total}`;
                
                // 기존 기록과 비교 (맞춘 개수가 더 높을 때만 업데이트)
                const prevCorrect = this.history[this.currentKey] ? parseInt(this.history[this.currentKey].split('/')[0]) : -1;
                
                if(correct > prevCorrect) {
                    this.history[this.currentKey] = scoreStr;
                    localStorage.setItem('v_h_vScoreHint', JSON.stringify(this.history));
                }

                const list = document.getElementById('wrongList'); list.innerHTML = '';
                if(this.wrongs.length > 0) {
                    document.getElementById('wrongReview').classList.remove('hidden');
                    this.wrongs.forEach(w => { list.innerHTML += `<li class="bg-white p-3 rounded-xl border border-rose-100 flex flex-col shadow-sm"><span class="font-black text-slate-800 text-sm">${w.word}</span><span class="text-rose-500 text-[10px] font-bold">${w.meaning}</span></li>`; });
                } else document.getElementById('wrongReview').classList.add('hidden');
                this.ri();
            },

            confirmExit() { document.getElementById('exitModal').classList.remove('hidden'); },
            exitNow() { document.getElementById('exitModal').classList.add('hidden'); document.getElementById('sessionLayer').classList.add('hidden'); this.renderGrid(); },
            toggleDict() { const p = document.getElementById('dictPanel'); const o = document.getElementById('dictOverlay'); const isOpen = p.classList.toggle('open'); o.classList.toggle('hidden', !isOpen); setTimeout(()=>o.style.opacity = isOpen ? '1' : '0', 10); },
            searchDict() { /* 사전 검색 로직 생략 (동일) */ },
            ri() { if(window.lucide) window.lucide.createIcons(); }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
